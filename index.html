<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Stock Guide</title>

    <!-- App Icon für iPhone/Android -->
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Outfit (Überschriften) & Inter (Fliesstext) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-hover: #2c2c2c;
            --primary: #f5c518;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --tag-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 16px 20px 14px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: 700;
        }

        .controls {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .search-box {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: var(--surface);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .filter-section {
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .filter-label {
            font-size: 0.75rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: var(--surface);
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: #777;
            color: #fff;
        }

        .chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        /* PACKSHOT STYLE (Bilder) */
        .card-img-container {
            width: 100%;
            height: 160px;
            background: transparent;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .card-img {
            transform: scale(1.08) translateY(-4px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .card-brand {
            font-family: var(--font-headings);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card-name {
            font-family: var(--font-headings);
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px 0;
            line-height: 1.1;
        }

        .card-short-desc {
            font-size: 0.95rem;
            color: #c0c0c8;
            margin-bottom: 20px;
            line-height: 1.5;
            flex-grow: 1;
            font-weight: 400;
        }

        .spec-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .spec-tag {
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--tag-bg);
            padding: 4px 10px;
            border-radius: 6px;
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spec-tag.highlight {
            color: var(--primary);
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.05);
        }

        .badge {
            font-family: var(--font-headings);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .badge-iso {
            background: var(--primary);
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
        }

        .badge-bw {
            background: #e0e0e0;
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .badge-slide {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .badge-c41 {
            background: #ec4899;
            color: #fff;
            box-shadow: 0 2px 10px rgba(236, 72, 153, 0.2);
        }

        .primary-btn {
            background: var(--primary);
            color: #000;
            border: 0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .secondary-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .danger-btn {
            background: transparent;
            color: #ff8b8b;
            border: 1px solid #744;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .view-section.hidden {
            display: none;
        }

        .rolls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 20px 10px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .rolls-header h2 {
            margin: 0;
            font-family: var(--font-headings);
            font-size: 1.4rem;
            color: #fff;
        }

        .rolls-header p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .roll-card {
            cursor: default;
            padding: 0;
            overflow: hidden;
        }

        .roll-card:hover {
            transform: none;
            border-color: #444;
        }

        .roll-card .card-name {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .roll-summary {
            cursor: pointer;
            display: grid;
            gap: 8px;
            list-style: none;
            padding: 15px;
        }

        .roll-summary::-webkit-details-marker {
            display: none;
        }

        .roll-summary-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .roll-summary-main {
            align-items: center;
            display: grid;
            gap: 12px;
            grid-template-columns: 58px minmax(0, 1fr);
        }

        .roll-packshot {
            align-items: center;
            align-self: stretch;
            background: radial-gradient(circle at 45% 30%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04) 55%, rgba(0, 0, 0, 0.16));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            height: 58px;
            justify-content: center;
            overflow: hidden;
            padding: 6px;
        }

        .roll-packshot img {
            display: block;
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.45));
        }

        .roll-packshot-placeholder {
            color: var(--text-secondary);
            font-family: var(--font-headings);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .roll-summary-copy {
            min-width: 0;
        }

        .roll-summary-hint {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .roll-details-body {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
        }

        .roll-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0;
        }

        .roll-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .camera-list {
            display: grid;
            gap: 10px;
            margin: 18px 0 22px;
        }

        .camera-row {
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            gap: 12px;
            justify-content: space-between;
            padding: 12px;
        }

        .camera-row strong {
            color: #fff;
            display: block;
            font-size: 0.98rem;
        }

        .camera-row span {
            color: var(--text-secondary);
            display: block;
            font-size: 0.82rem;
            margin-top: 3px;
        }

        .checkbox-list {
            display: grid;
            gap: 8px;
        }

        .checkbox-row {
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-primary);
            display: flex;
            gap: 8px;
            padding: 10px 12px;
        }

        .checkbox-row input {
            accent-color: var(--primary);
        }

        .rolls-tools {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .rolls-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto 14px;
            padding: 0 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .rolls-search {
            max-width: 1200px;
            margin: 0 auto 12px;
            padding: 0 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .search-field {
            position: relative;
            width: 100%;
        }

        .search-icon {
            color: var(--primary);
            height: 18px;
            left: 14px;
            opacity: 0.9;
            pointer-events: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
        }

        .roll-search-box {
            width: 100%;
            box-sizing: border-box;
            background: #171717;
            border: 1px solid #5b5b5b;
            border-radius: 8px;
            color: #fff;
            padding: 12px 14px 12px 42px;
            font-size: 16px;
        }

        .roll-search-box:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .roll-filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .roll-filter-row::-webkit-scrollbar {
            display: none;
        }

        .roll-filter-btn {
            background: var(--surface);
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
        }

        .status-label {
            align-items: center;
            display: inline-flex;
            gap: 6px;
        }

        .status-icon {
            color: currentColor;
            flex: 0 0 auto;
            height: 15px;
            width: 15px;
        }

        .roll-filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: 700;
        }

        .roll-sort {
            background: #171717;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 9px 10px;
            font-size: 0.9rem;
        }

        .sync-status {
            color: var(--text-secondary);
            font-size: 0.8rem;
            width: 100%;
            text-align: right;
        }

        .roll-result-section {
            grid-column: 1/-1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .roll-result-heading {
            grid-column: 1/-1;
            margin: 8px 0 -4px;
            color: #fff;
            font-family: var(--font-headings);
            font-size: 1rem;
            font-weight: 800;
        }

        .roll-result-heading span {
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 6px;
        }

        .roll-code {
            background: rgba(245, 197, 24, 0.12);
            border: 1px solid rgba(245, 197, 24, 0.35);
            border-radius: 8px;
            color: var(--primary);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 5px 9px;
            white-space: nowrap;
        }

        .profile-line {
            color: var(--text-secondary);
            font-size: 0.82rem;
            margin-top: 6px;
        }

        .form-grid {
            display: grid;
            gap: 14px;
        }

        .form-field label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-field.hidden {
            display: none;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            box-sizing: border-box;
            background: #171717;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 16px;
        }

        .form-field textarea {
            min-height: 90px;
            resize: vertical;
            font-family: inherit;
        }

        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            color: #777;
            margin-top: 40px;
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 28px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #18181b;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid var(--surface-border);
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        /* Modal Hero Section */
        .modal-hero {
            position: relative;
            padding: 40px 30px 30px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--surface-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .modal-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(24, 24, 27, 0.7) 0%, rgba(24, 24, 27, 0.95) 100%);
            z-index: 1;
        }

        .modal-hero-img {
            max-width: 140px;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
        }

        .modal-hero-text {
            position: relative;
            z-index: 2;
            flex-grow: 1;
        }

        .modal-body {
            padding: 30px;
        }

        .pro-tip-box {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 0 0 30px 0;
        }

        .section-title {
            font-family: var(--font-headings);
            color: #fff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 35px;
            margin-bottom: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .info-item label {
            display: block;
            font-size: 0.75rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            /* Drückt Footer nach unten */
            padding-top: 40px;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding-bottom: 40px;
            background: var(--bg);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid #555;
        }

        footer a:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .disclaimer {
            margin-top: 10px;
            font-size: 0.7rem;
            opacity: 0.6;
            line-height: 1.4;
        }

        @media (max-width: 640px) {
            .rolls-header {
                align-items: stretch;
                flex-direction: column;
            }

            .rolls-controls {
                align-items: stretch;
                flex-direction: column;
            }

            .roll-sort {
                width: 100%;
            }

            .rolls-tools {
                justify-content: stretch;
            }

            .rolls-tools button {
                flex: 1;
            }

            .sync-status {
                text-align: left;
            }

            .roll-card .roll-meta {
                grid-template-columns: 1fr 1fr;
            }

            .roll-summary-main {
                grid-template-columns: 50px minmax(0, 1fr);
            }

            .roll-packshot {
                height: 50px;
                padding: 5px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>FILM STOCK GUIDE</h1>
        <nav class="top-nav" aria-label="Hauptnavigation">
            <button type="button" id="guideNavBtn" class="nav-btn active" onclick="switchView('guide')">Guide</button>
            <button type="button" id="rollsNavBtn" class="nav-btn" onclick="switchView('rolls')">Rollen</button>
        </nav>
    </header>

    <main>
        <section id="guideView" class="view-section">
            <div class="controls">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        let activeFilter = 'all';
        let filterMode = 'all';
        let activeFilterKey = '';

        // Diese URL erhältst du aus Google Sheets -> Datei -> Freigeben -> Im Web veröffentlichen -> als CSV
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/13lPATFa6AumQkerDv_6CXJ68tp7QXoMfeP5GUFsekY0/export?format=csv&gid=158929564";
        const ROLLS_KEY = 'filmGuideRolls_v1';
        const CAMERAS_KEY = 'filmGuideCameras_v1';
        const LENSES_KEY = 'filmGuideLenses_v1';
        const CAMERA_LENSES_KEY = 'filmGuideCameraLenses_v1';
        const USER_PROFILE_KEY = 'filmGuideUserProfile_v1';
        // Nach dem Deploy des Apps Scripts hier die Web-App-URL eintragen.
        const ROLLS_API_URL = 'https://script.google.com/macros/s/AKfycbxzdz1ma0vVxY8U8lzQFPwrKnR6OiU_1ItsUzfBToR8J7kSBIeXOh6CLC_Qlg7bWoFQLw/exec';
        let filmsData = [];
        let rollsData = [];
        let camerasData = [];
        let lensesData = [];
        let cameraLensesData = [];
        let userProfile = null;
        let rollStatusFilter = 'all';
        let rollSortMode = 'status';
        let rollSearchQuery = '';
        let rollNameWasEdited = false;
        let lastGeneratedRollName = '';

        function hasRollsApi() {
            return Boolean(ROLLS_API_URL && ROLLS_API_URL.trim());
        }

        function withCacheBuster(url) {
            const separator = url.includes('?') ? '&' : '?';
            return `${url}${separator}_=${Date.now()}`;
        }

        function getCsvValue(row, key) {
            return normalizeSwissGermanText(row[key]);
        }

        function normalizeSwissGermanText(value) {
            return String(value || '').replace(/\u00df/g, 'ss').trim();
        }

        function getFirstCsvValue(row, keys) {
            for (const key of keys) {
                const value = getCsvValue(row, key);
                if (value) return value;
            }
            return '';
        }

        function setRollsSyncStatus(message) {
            const status = document.getElementById('rollsSyncStatus');
            if (status) status.textContent = message;
        }

        function cacheRolls() {
            localStorage.setItem(ROLLS_KEY, JSON.stringify(rollsData));
        }

        function cacheCameras() {
            localStorage.setItem(CAMERAS_KEY, JSON.stringify(camerasData));
        }

        function cacheLenses() {
            localStorage.setItem(LENSES_KEY, JSON.stringify(lensesData));
        }

        function cacheCameraLenses() {
            localStorage.setItem(CAMERA_LENSES_KEY, JSON.stringify(cameraLensesData));
        }

        function normalizeEmail(value) {
            return String(value || '').trim().toLowerCase();
        }

        function loadUserProfile() {
            const savedProfile = localStorage.getItem(USER_PROFILE_KEY);
            if (!savedProfile) {
                userProfile = null;
                updateProfileSummary();
                return;
            }

            try {
                const parsedProfile = JSON.parse(savedProfile);
                userProfile = {
                    name: String(parsedProfile.name || '').trim(),
                    email: normalizeEmail(parsedProfile.email)
                };
            } catch (error) {
                console.error("Fehler beim Lesen des Profils", error);
                userProfile = null;
            }

            updateProfileSummary();
        }

        function saveUserProfile(profile) {
            userProfile = {
                name: String(profile.name || '').trim(),
                email: normalizeEmail(profile.email)
            };
            localStorage.setItem(USER_PROFILE_KEY, JSON.stringify(userProfile));
            updateProfileSummary();
        }

        function hasUserProfile() {
            return Boolean(userProfile && userProfile.email);
        }

        function updateProfileSummary() {
            const profileSummary = document.getElementById('profileSummary');
            if (!profileSummary) return;

            if (hasUserProfile()) {
                profileSummary.textContent = `${userProfile.name || 'Profil'} · ${userProfile.email}`;
            } else {
                profileSummary.textContent = 'Kein Profil gesetzt';
            }
        }

        function requireUserProfile() {
            if (hasUserProfile()) return true;
            openProfileForm();
            return false;
        }

        function attachCurrentUser(roll) {
            if (!hasUserProfile()) return roll;
            return {
                ...roll,
                userEmail: normalizeEmail(roll.userEmail || roll['User Email'] || userProfile.email),
                userName: roll.userName || roll['User Name'] || userProfile.name || ''
            };
        }

        function isCurrentUserRoll(roll) {
            if (!hasUserProfile()) return true;
            const rollEmail = normalizeEmail(roll.userEmail || roll['User Email'] || roll.email || roll.Mail);
            return !rollEmail || rollEmail === userProfile.email;
        }

        function attachCurrentUserCamera(camera) {
            if (!hasUserProfile()) return camera;
            return {
                ...camera,
                userEmail: normalizeEmail(camera.userEmail || camera['User Email'] || userProfile.email),
                userName: camera.userName || camera['User Name'] || userProfile.name || ''
            };
        }

        function isCurrentUserCamera(camera) {
            if (!hasUserProfile()) return true;
            const cameraEmail = normalizeEmail(camera.userEmail || camera['User Email'] || camera.email || camera.Mail);
            return !cameraEmail || cameraEmail === userProfile.email;
        }

        function attachCurrentUserLens(lens) {
            if (!hasUserProfile()) return lens;
            return {
                ...lens,
                userEmail: normalizeEmail(lens.userEmail || lens['User Email'] || userProfile.email),
                userName: lens.userName || lens['User Name'] || userProfile.name || ''
            };
        }

        function attachCurrentUserCameraLens(mapping) {
            if (!hasUserProfile()) return mapping;
            return {
                ...mapping,
                userEmail: normalizeEmail(mapping.userEmail || mapping['User Email'] || userProfile.email),
                userName: mapping.userName || mapping['User Name'] || userProfile.name || ''
            };
        }

        function isCurrentUserLens(lens) {
            if (!hasUserProfile()) return true;
            const lensEmail = normalizeEmail(lens.userEmail || lens['User Email'] || lens.email || lens.Mail);
            return !lensEmail || lensEmail === userProfile.email;
        }

        function isCurrentUserCameraLens(mapping) {
            if (!hasUserProfile()) return true;
            const mappingEmail = normalizeEmail(mapping.userEmail || mapping['User Email'] || mapping.email || mapping.Mail);
            return !mappingEmail || mappingEmail === userProfile.email;
        }

        function getRollCode(roll) {
            return getRollValue(roll, ['rollCode', 'Roll ID', 'Roll-ID', 'Rollen-ID']);
        }

        function getRollCodeNumber(roll) {
            const match = String(getRollCode(roll) || '').match(/^R(\d+)$/i);
            return match ? Number(match[1]) : 0;
        }

        function formatRollCode(number) {
            return `R${String(number).padStart(3, '0')}`;
        }

        function generateNextRollCode(existingRolls) {
            const highestNumber = existingRolls.reduce((highest, roll) => Math.max(highest, getRollCodeNumber(roll)), 0);
            return formatRollCode(highestNumber + 1);
        }

        function ensureUserRollCodes(rolls) {
            const usedCodes = new Set();
            const nextRolls = [...rolls]
                .sort((a, b) => getRollSortDateValue(a).localeCompare(getRollSortDateValue(b)) || String(a.id || '').localeCompare(String(b.id || '')));
            let nextNumber = nextRolls.reduce((highest, roll) => Math.max(highest, getRollCodeNumber(roll)), 0) + 1;

            nextRolls.forEach(roll => {
                const currentCode = getRollCode(roll);
                if (currentCode && !usedCodes.has(currentCode)) {
                    roll.rollCode = currentCode;
                    usedCodes.add(currentCode);
                    return;
                }

                let nextCode = formatRollCode(nextNumber);
                while (usedCodes.has(nextCode)) {
                    nextNumber += 1;
                    nextCode = formatRollCode(nextNumber);
                }
                roll.rollCode = nextCode;
                usedCodes.add(nextCode);
                nextNumber += 1;
            });

            return rolls;
        }

        function normalizeRollFormat(value) {
            const rawFormat = String(value || '').trim();
            const compactFormat = rawFormat.toLowerCase().replace(/\s+/g, '');
            if (!compactFormat) return '';
            if (compactFormat === '35mm' || compactFormat === '35' || compactFormat === '135mm') return '135';
            if (compactFormat === '120mm') return '120';
            if (compactFormat.includes('4x5') || compactFormat.includes('4×5')) return '4x5';
            if (compactFormat.includes('8x10') || compactFormat.includes('8×10')) return '8x10';
            if (compactFormat.includes('instax')) return 'Instax';
            return rawFormat;
        }

        function mergeSyncedRolls(syncedRolls) {
            const mergedRolls = syncedRolls
                .filter(roll => roll && roll.id)
                .filter(isCurrentUserRoll)
                .map(serverRoll => {
                    const localRoll = rollsData.find(item => item.id === serverRoll.id) || {};
                    const mergedRoll = attachCurrentUser({ ...localRoll, ...serverRoll });

                    ['format', 'ratedIso', 'note', 'process', 'rollCode', 'cameraId'].forEach(key => {
                        if (!serverRoll[key] && localRoll[key]) {
                            mergedRoll[key] = localRoll[key];
                        }
                    });

                    if (!serverRoll.loadedAt && localRoll.loadedAt) mergedRoll.loadedAt = localRoll.loadedAt;
                    if (!serverRoll.createdAt && localRoll.createdAt) mergedRoll.createdAt = localRoll.createdAt;
                    if (!serverRoll.updatedAt && localRoll.updatedAt) mergedRoll.updatedAt = localRoll.updatedAt;
                    mergedRoll.format = normalizeRollFormat(mergedRoll.format);
                    return mergedRoll;
                });
            return ensureUserRollCodes(mergedRolls);
        }

        function mergeSyncedCameras(syncedCameras) {
            return syncedCameras
                .filter(camera => camera && camera.id)
                .filter(isCurrentUserCamera)
                .map(serverCamera => {
                    const localCamera = camerasData.find(item => item.id === serverCamera.id) || {};
                    return attachCurrentUserCamera({ ...localCamera, ...serverCamera });
                })
                .sort((a, b) => getCameraLabel(a).localeCompare(getCameraLabel(b)));
        }

        function mergeSyncedLenses(syncedLenses) {
            return syncedLenses
                .filter(lens => lens && lens.id)
                .filter(isCurrentUserLens)
                .map(serverLens => {
                    const localLens = lensesData.find(item => item.id === serverLens.id) || {};
                    return attachCurrentUserLens({ ...localLens, ...serverLens });
                })
                .sort((a, b) => getLensLabel(a).localeCompare(getLensLabel(b)));
        }

        function mergeSyncedCameraLenses(syncedCameraLenses) {
            return syncedCameraLenses
                .filter(mapping => mapping && mapping.cameraId && mapping.lensId)
                .filter(isCurrentUserCameraLens)
                .map(attachCurrentUserCameraLens);
        }

        function loadRolls() {
            const savedRolls = localStorage.getItem(ROLLS_KEY);
            if (!savedRolls) {
                rollsData = [];
                renderRolls();
            } else {
                try {
                    rollsData = JSON.parse(savedRolls)
                        .filter(isCurrentUserRoll)
                        .map(attachCurrentUser);
                    ensureUserRollCodes(rollsData);
                    cacheRolls();
                } catch (e) {
                    console.error("Fehler beim Lesen der Rollen", e);
                    rollsData = [];
                }

                renderRolls();
            }

            fetchRollsFromSync({ silent: true });
        }

        function loadCameras() {
            const savedCameras = localStorage.getItem(CAMERAS_KEY);
            if (!savedCameras) {
                camerasData = [];
            } else {
                try {
                    camerasData = JSON.parse(savedCameras)
                        .filter(isCurrentUserCamera)
                        .map(attachCurrentUserCamera)
                        .sort((a, b) => getCameraLabel(a).localeCompare(getCameraLabel(b)));
                    cacheCameras();
                } catch (error) {
                    console.error("Fehler beim Lesen der Kameras", error);
                    camerasData = [];
                }
            }

            fetchCamerasFromSync({ silent: true });
        }

        function loadLenses() {
            const savedLenses = localStorage.getItem(LENSES_KEY);
            if (!savedLenses) {
                lensesData = [];
            } else {
                try {
                    lensesData = JSON.parse(savedLenses)
                        .filter(isCurrentUserLens)
                        .map(attachCurrentUserLens)
                        .sort((a, b) => getLensLabel(a).localeCompare(getLensLabel(b)));
                    cacheLenses();
                } catch (error) {
                    console.error("Fehler beim Lesen der Objektive", error);
                    lensesData = [];
                }
            }

            const savedCameraLenses = localStorage.getItem(CAMERA_LENSES_KEY);
            if (!savedCameraLenses) {
                cameraLensesData = [];
            } else {
                try {
                    cameraLensesData = JSON.parse(savedCameraLenses)
                        .filter(isCurrentUserCameraLens)
                        .map(attachCurrentUserCameraLens);
                    cacheCameraLenses();
                } catch (error) {
                    console.error("Fehler beim Lesen der Objektivzuordnung", error);
                    cameraLensesData = [];
                }
            }

            fetchLensesFromSync({ silent: true });
        }

        function saveRolls() {
            cacheRolls();
            renderRolls();
        }

        function saveCameras() {
            camerasData = camerasData.sort((a, b) => getCameraLabel(a).localeCompare(getCameraLabel(b)));
            cacheCameras();
            renderRolls();
        }

        function saveLenses() {
            lensesData = lensesData.sort((a, b) => getLensLabel(a).localeCompare(getLensLabel(b)));
            cacheLenses();
            cacheCameraLenses();
            renderRolls();
        }

        async function fetchRollsFromSync(options = {}) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            if (!options.silent) setRollsSyncStatus('Synchronisiere...');

            try {
                const response = await fetch(`${ROLLS_API_URL}?action=list&userEmail=${encodeURIComponent(userProfile.email)}&ts=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                const nextRolls = Array.isArray(payload) ? payload : (payload.rolls || []);
                rollsData = mergeSyncedRolls(nextRolls);
                cacheRolls();
                renderRolls();
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Synchronisieren der Rollen", error);
                setRollsSyncStatus('Offline: lokaler Stand');
            }
        }

        async function syncAllData() {
            await fetchCamerasFromSync();
            await fetchLensesFromSync();
            await fetchRollsFromSync();
        }

        async function syncRollMutation(action, roll) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            setRollsSyncStatus('Speichere...');

            try {
                const response = await fetch(ROLLS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action,
                        roll: roll ? attachCurrentUser(roll) : null,
                        id: roll ? roll.id : '',
                        userEmail: userProfile.email
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (payload.ok === false) throw new Error(payload.error || 'Sync failed');
                if (payload.rolls) {
                    rollsData = mergeSyncedRolls(payload.rolls);
                    cacheRolls();
                    renderRolls();
                }
                if (Array.isArray(payload.cameras)) {
                    camerasData = mergeSyncedCameras(payload.cameras);
                    cacheCameras();
                }
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Speichern der Rolle", error);
                setRollsSyncStatus('Nicht synchronisiert');
            }
        }

        async function fetchCamerasFromSync(options = {}) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            try {
                const response = await fetch(`${ROLLS_API_URL}?action=listCameras&userEmail=${encodeURIComponent(userProfile.email)}&ts=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (!Array.isArray(payload.cameras)) throw new Error('Camera sync not available');
                camerasData = mergeSyncedCameras(payload.cameras);
                cacheCameras();
                if (!options.silent) setRollsSyncStatus('Kameras synchronisiert');
            } catch (error) {
                console.error("Fehler beim Synchronisieren der Kameras", error);
                if (!options.silent) setRollsSyncStatus('Kameras lokal');
            }
        }

        async function fetchLensesFromSync(options = {}) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            try {
                const response = await fetch(`${ROLLS_API_URL}?action=listLenses&userEmail=${encodeURIComponent(userProfile.email)}&ts=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (!Array.isArray(payload.lenses)) throw new Error('Lens sync not available');
                lensesData = mergeSyncedLenses(payload.lenses);
                cameraLensesData = mergeSyncedCameraLenses(payload.cameraLenses || []);
                cacheLenses();
                cacheCameraLenses();
                if (!options.silent) setRollsSyncStatus('Objektive synchronisiert');
            } catch (error) {
                console.error("Fehler beim Synchronisieren der Objektive", error);
                if (!options.silent) setRollsSyncStatus('Objektive lokal');
            }
        }

        async function syncCameraMutation(action, camera) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            setRollsSyncStatus('Speichere Kamera...');

            try {
                const response = await fetch(ROLLS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action,
                        camera: camera ? attachCurrentUserCamera(camera) : null,
                        id: camera ? camera.id : '',
                        userEmail: userProfile.email
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (payload.ok === false) throw new Error(payload.error || 'Camera sync failed');
                if (Array.isArray(payload.cameras)) {
                    camerasData = mergeSyncedCameras(payload.cameras);
                    cacheCameras();
                    renderRolls();
                }
                if (Array.isArray(payload.cameraLenses)) {
                    cameraLensesData = mergeSyncedCameraLenses(payload.cameraLenses);
                    cacheCameraLenses();
                }
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Speichern der Kamera", error);
                setRollsSyncStatus('Kamera nicht synchronisiert');
            }
        }

        async function syncLensMutation(action, lens, cameraIds = []) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            setRollsSyncStatus('Speichere Objektiv...');

            try {
                const response = await fetch(ROLLS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action,
                        lens: lens ? attachCurrentUserLens(lens) : null,
                        cameraIds,
                        id: lens ? lens.id : '',
                        userEmail: userProfile.email,
                        userName: userProfile.name || ''
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (payload.ok === false) throw new Error(payload.error || 'Lens sync failed');
                if (Array.isArray(payload.lenses)) {
                    lensesData = mergeSyncedLenses(payload.lenses);
                    cacheLenses();
                }
                if (Array.isArray(payload.cameraLenses)) {
                    cameraLensesData = mergeSyncedCameraLenses(payload.cameraLenses);
                    cacheCameraLenses();
                }
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Speichern des Objektivs", error);
                setRollsSyncStatus('Objektiv nicht synchronisiert');
            }
        }

        function escapeHtml(value) {

                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')

        function normalizeFilmName(value) {

        function getFilmLabel(film) {
            return film ? `${film.brand} ${film.name}`.trim() : '';

        function getFilmByName(filmName) {
            const normalizedName = normalizeFilmName(filmName);

            return filmsData.find(film => {

        function normalizeCameraName(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/\s+/g, ' ');
        }

        function getCameraLabel(camera) {
            if (!camera) return '';
            return String(camera.name || [camera.brand, camera.model].filter(Boolean).join(' ') || '').trim();

        function getCameraById(cameraId) {
            return camerasData.find(camera => camera.id === cameraId) || null;
        }

        function getCameraByName(cameraName) {
            const normalizedName = normalizeCameraName(cameraName);
            if (!normalizedName) return null;
            return camerasData.find(camera => normalizeCameraName(getCameraLabel(camera)) === normalizedName) || null;
        }

        function getRollCameraName(roll) {
            const camera = getCameraById(roll.cameraId) || getCameraByName(roll.camera);
            return camera ? getCameraLabel(camera) : String(roll.camera || '').trim();

        function getCameraMeta(camera) {
            const lensLabels = getCameraLensLabels(camera.id);
            const lensSummary = lensLabels.length
                ? lensLabels.slice(0, 3).join(', ') + (lensLabels.length > 3 ? ` +${lensLabels.length - 3}` : '')
                : '';
            return [
                camera.format,
                lensSummary,
                camera.note
            ].filter(Boolean).join(' · ');
        }

        function getLensLabel(lens) {
            if (!lens) return '';
            return [
                lens.brand,
                lens.name || lens.focalLength
            ].filter(Boolean).join(' ').trim();
        }

        function getLensById(lensId) {
            return lensesData.find(lens => lens.id === lensId) || null;
        }

        function getCameraLensIds(cameraId) {
            return cameraLensesData
                .filter(mapping => mapping.cameraId === cameraId)
                .map(mapping => mapping.lensId);
        }

        function getLensCameraIds(lensId) {
            return cameraLensesData
                .filter(mapping => mapping.lensId === lensId)
                .map(mapping => mapping.cameraId);
        }

        function getCameraLensLabels(cameraId) {
            return getCameraLensIds(cameraId)
                .map(getLensById)
                .filter(Boolean)
                .map(getLensLabel);
        }

        function getLensMeta(lens) {
            return [
                lens.focalLength,
                lens.maxAperture,
                lens.mount,
                lens.type,
                lens.character
            ].filter(Boolean).join(' · ');
        }

        function setLensCameraMappings(lensId, cameraIds) {
            const existingOtherMappings = cameraLensesData.filter(mapping => mapping.lensId !== lensId);
            const now = new Date().toISOString();
            const nextMappings = [...new Set(cameraIds || [])].filter(Boolean).map(cameraId => attachCurrentUserCameraLens({
                id: `${cameraId}_${lensId}`,
                cameraId,
                lensId,
                createdAt: now,
                updatedAt: now
            }));
            cameraLensesData = [...existingOtherMappings, ...nextMappings];
        }

        function formatTodayForInput() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function isValidDatePart(year, month, day) {
            const fullYear = Number(year);
            const monthNumber = Number(month);
            const dayNumber = Number(day);
            return fullYear >= 1900 &&
                fullYear <= 2100 &&
                monthNumber >= 1 &&
                monthNumber <= 12 &&
                dayNumber >= 1 &&
                dayNumber <= 31;
        }

        function parseGoogleSheetsDateSerial(value) {
            const serial = Number(value);
            if (!Number.isFinite(serial) || serial < 20000 || serial > 80000) return null;

            const date = new Date(Date.UTC(1899, 11, 30) + Math.floor(serial) * 86400000);
            return {
                year: date.getUTCFullYear(),
                month: date.getUTCMonth() + 1,
                day: date.getUTCDate()
            };
        }

        function parseRollDateParts(dateValue) {
            if (!dateValue) return null;
            const rawDate = String(dateValue).trim();

            if (/^\d+(\.\d+)?$/.test(rawDate)) {
                return parseGoogleSheetsDateSerial(rawDate);
            }

            const isoMatch = rawDate.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (isoMatch && isValidDatePart(isoMatch[1], isoMatch[2], isoMatch[3])) {
                return {
                    year: Number(isoMatch[1]),
                    month: Number(isoMatch[2]),
                    day: Number(isoMatch[3])
                };
            }

            const shortIsoMatch = rawDate.match(/^(\d{2})-(\d{1,2})-(\d{1,2})$/);
            if (shortIsoMatch && isValidDatePart(`20${shortIsoMatch[1]}`, shortIsoMatch[2], shortIsoMatch[3])) {
                return {
                    year: Number(`20${shortIsoMatch[1]}`),
                    month: Number(shortIsoMatch[2]),
                    day: Number(shortIsoMatch[3])
                };
            }

            const swissMatch = rawDate.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
            if (swissMatch) {
                const year = swissMatch[3].length === 2 ? `20${swissMatch[3]}` : swissMatch[3];
                if (isValidDatePart(year, swissMatch[2], swissMatch[1])) {
                    return {
                        year: Number(year),
                        month: Number(swissMatch[2]),
                        day: Number(swissMatch[1])
                    };
                }
            }

            const parsedDate = new Date(rawDate);
            if (!Number.isNaN(parsedDate.getTime()) && isValidDatePart(parsedDate.getFullYear(), parsedDate.getMonth() + 1, parsedDate.getDate())) {
                return {
                    year: parsedDate.getFullYear(),
                    month: parsedDate.getMonth() + 1,
                    day: parsedDate.getDate()
                };
            }

            return null;
        }

        function formatRollDateParts(parts, yearMode = 'short') {
            if (!parts) return '';
            const year = yearMode === 'full' ? String(parts.year) : String(parts.year).slice(-2);
            const month = String(parts.month).padStart(2, '0');
            const day = String(parts.day).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateForRollName(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'short');
        }

        function formatDateForDisplay(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'short') || 'Kein Datum';
        }

        function formatDateForInputValue(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'full') || formatTodayForInput();
        }

        function getRollDateValue(roll) {
            return roll.loadedAt ||
                roll.loaded_at ||
                roll['Loaded at'] ||
                roll['loaded at'] ||
                roll['Datum'] ||
                roll.createdAt ||
                roll.created_at ||
                roll['Created at'] ||
                roll['created at'] ||
                roll.updatedAt ||
                roll.updated_at ||
                roll['Updated at'] ||
                roll['updated at'];
        }

        function getRollValue(roll, keys) {
            for (const key of keys) {
                if (roll[key]) return roll[key];
            }
            return '';
        }

        function getRollFormat(roll) {
            return normalizeRollFormat(getRollValue(roll, ['format', 'Format']));
        }

        function getRollRatedIso(roll) {
            return getRollValue(roll, ['ratedIso', 'ratedISO', 'ISO eingestellt', 'ISO geratet', 'Rated ISO']);
        }

        function getRollNote(roll) {
            return getRollValue(roll, ['note', 'Notiz', 'notes']);
        }

        function getRollProcess(roll) {
            return getRollValue(roll, ['process', 'Prozess', 'Entwicklung']);
        }

        function rollNamePart(value, fallback) {
            const source = String(value || fallback || '').trim();
            return source
                .replace(/[^a-zA-Z0-9äöüÄÖÜ\u00df]+/g, '_')
                .replace(/^_+|_+$/g, '') || fallback;
        }

        function buildRollName(dateValue, filmName, cameraName) {
            const datePart = formatDateForRollName(dateValue) || formatDateForRollName(formatTodayForInput());
            const filmPart = rollNamePart(filmName, 'Film');
            const cameraPart = rollNamePart(cameraName, 'Kamera');
            return `${datePart}_${filmPart}_${cameraPart}`;
        }

        function getFilmImagePath(imageValue) {
            const imageName = String(imageValue || '').trim();
            if (!imageName) return '';
            if (/^https?:\/\//i.test(imageName) || imageName.startsWith('img/')) return imageName;
            if (imageName.includes('/')) return `img/${imageName}`;
            const vintageImageName = imageName
                .replace(/\.[^.]+$/, '')
                .toLowerCase() + '.webp';
            return `img/packshots-vintage/${vintageImageName}`;
        }

        function prepareData() {
            if (!filmsData || filmsData.length === 0) {
                document.getElementById('grid').innerHTML =
                    '<div style="text-align:center; color:#777; width:100%; grid-column:1/-1;">Lade Filme aus der Datenbank...</div>';
                return;
            }

            filmsData.forEach(film => {
                if (!film.keywords) film.keywords = [];

                // 1. Alle Specs aus Notion (z.B. "Premium", "Grob") suchbar machen
                if (film.specs) {
                    Object.values(film.specs).forEach(val => {
                        if (val) film.keywords.push(val);
                    });
                }

                // 2. Intelligente Synonyme (Mapping)

                // Korn Synonyme
                if (film.specs.grain === "Sichtbar" || film.specs.grain === "Grob") {
                    film.keywords.push("Grain", "Korn", "Stark");
                }

                // Budget Synonyme
                if (film.specs.budget === "Budget") {
                    film.keywords.push("Günstig", "Billig", "Cheap");
                }
                if (film.specs.budget === "Premium") {
                    film.keywords.push("Teuer", "Pro", "Professional", "Profi");
                }

                // Sicherstellen, dass Bildpfad existiert
                if (!film.img) film.img = "";
            });

            renderGrid(filmsData);
            renderRolls();
        }

            data.forEach(film => {

                if (film.type && (film.type.includes("B&W") || film.type.includes("SW"))) badgeClass = "badge-bw";
                if (film.type && (film.type.includes("Slide") || film.type.includes("Dia"))) badgeClass = "badge-slide";

                const card = document.createElement('div');

                card.onclick = () => openModal(film);

        function setFilter(filterValue, btnElement, mode, specKey = '') {
            activeFilter = filterValue;
            filterMode = mode;
            activeFilterKey = specKey;

            btnElement.classList.add('active');

            executeSearch();

        function executeSearch() {
            const rawQuery = document.getElementById('searchInput').value.toLowerCase();
            const query = rawQuery.trim();

            const filtered = filmsData.filter(film => {
                const searchableText = [
                    film.name,
                    film.brand,
                    film.shortDesc,
                    film.process,
                    film.type,
                    film.keywords.join(" "),
                    film.uses.join(" ")
                ].join(" ").toLowerCase();

                const textMatch = searchableText.includes(query);

                let catMatch = true;
                if (activeFilter !== 'all') {
                    if (filterMode === 'type') {
                        catMatch = film.type === activeFilter;
                    } else if (filterMode === 'spec') {
                        catMatch = activeFilterKey
                            ? film.specs[activeFilterKey] === activeFilter
                            : Object.values(film.specs).includes(activeFilter);
                    }
                }

                return textMatch && catMatch;
            });

            renderGrid(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', executeSearch);

        function getRollSearchText(roll) {
            const film = getFilmById(roll.filmId) || getFilmByName(roll.filmName);
            const cameraName = getRollCameraName(roll);
            return [
                getRollCode(roll),
                roll.name,
                roll.status,

                getRollDateValue(roll),

        function rollMatchesSearch(roll) {
            if (!rollSearchQuery) return true;
            return getRollSearchText(roll).includes(rollSearchQuery);
        }

        function getRollSortDateValue(roll) {
            return formatRollDateParts(parseRollDateParts(getRollDateValue(roll)), 'full') || String(getRollDateValue(roll) || '');
        }

        function compareRollDateDesc(a, b) {
            return getRollSortDateValue(b).localeCompare(getRollSortDateValue(a));
        }

        function compareRollDateAsc(a, b) {
            return getRollSortDateValue(a).localeCompare(getRollSortDateValue(b));
        }

        function sortRollsForSearchGroup(status, rolls) {
            const sortedRolls = [...rolls];
            if (status === 'Belichtet') {
                return sortedRolls.sort(compareRollDateAsc);
            }
            if (status === 'Entwickelt') {
                return sortedRolls.sort(compareRollDateDesc);
            }
            return sortedRolls.sort((a, b) => getRollCameraName(a).localeCompare(getRollCameraName(b)) || compareRollDateDesc(a, b));
        }

            if (!hasUserProfile()) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Profil fehlt.</strong><br>
                        Lege ein Profil mit Name und Mail an, damit nur deine Rollen angezeigt werden.<br><br>
                        <button type="button" class="primary-btn" onclick="openProfileForm()">Profil anlegen</button>
                    </div>
                `;
                return;
            }

            if (rollsData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Noch keine Rollen.</strong><br>
                        Lege eine Rolle direkt aus einem Film im Guide an.
                    </div>
                `;
                return;
            }

            const statusRank = { "In Kamera": 1, "Belichtet": 2, "Entwickelt": 3 };
            const visibleRolls = rollsData
                .filter(roll => rollStatusFilter === 'all' || roll.status === rollStatusFilter)
                .filter(rollMatchesSearch);

            if (visibleRolls.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Keine Rollen gefunden.</strong><br>
                        Passe Suche oder Filter an.
                    </div>
                `;
                return;
            }

            if (rollSearchQuery) {
                ['In Kamera', 'Belichtet', 'Entwickelt'].forEach(status => {
                    const groupRolls = sortRollsForSearchGroup(status, visibleRolls.filter(roll => (roll.status || 'In Kamera') === status));
                    if (groupRolls.length === 0) return;

                    const section = document.createElement('section');
                    section.className = 'roll-result-section';
                    section.innerHTML = `<h3 class="roll-result-heading">${escapeHtml(status)} <span>${groupRolls.length}</span></h3>`;
                    groupRolls.forEach(roll => section.appendChild(renderRollCard(roll)));
                    grid.appendChild(section);
                });
                return;
            }

            const sortedRolls = [...visibleRolls].sort((a, b) => {
                if (rollSortMode === 'date') {
                    return compareRollDateDesc(a, b);
                }
                if (rollSortMode === 'camera') {
                    return getRollCameraName(a).localeCompare(getRollCameraName(b));
                }
                if (rollSortMode === 'film') {
                    return String(a.filmName || '').localeCompare(String(b.filmName || ''));
                }
                if (rollSortMode === 'format') {
                    return String(getRollFormat(a) || '').localeCompare(String(getRollFormat(b) || ''));
                }

                const byStatus = (statusRank[a.status] || 9) - (statusRank[b.status] || 9);
                if (byStatus !== 0) return byStatus;
                return compareRollDateDesc(a, b);
            });

            sortedRolls.forEach(roll => {
                grid.appendChild(renderRollCard(roll));
            });
        }

                if (!isCustomFilm && isoInput) isoInput.value = '';
