<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Stock Guide</title>

    <!-- App Icon für iPhone/Android -->
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Outfit (Überschriften) & Inter (Fließtext) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-hover: #2c2c2c;
            --primary: #f5c518;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --tag-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 16px 20px 14px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: 700;
        }

        .controls {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .search-box {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: var(--surface);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .filter-section {
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .filter-label {
            font-size: 0.75rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: var(--surface);
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: #777;
            color: #fff;
        }

        .chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        /* PACKSHOT STYLE (Bilder) */
        .card-img-container {
            width: 100%;
            height: 160px;
            background: transparent;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .card-img {
            transform: scale(1.08) translateY(-4px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .card-brand {
            font-family: var(--font-headings);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card-name {
            font-family: var(--font-headings);
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px 0;
            line-height: 1.1;
        }

        .card-short-desc {
            font-size: 0.95rem;
            color: #c0c0c8;
            margin-bottom: 20px;
            line-height: 1.5;
            flex-grow: 1;
            font-weight: 400;
        }

        .spec-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .spec-tag {
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--tag-bg);
            padding: 4px 10px;
            border-radius: 6px;
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spec-tag.highlight {
            color: var(--primary);
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.05);
        }

        .badge {
            font-family: var(--font-headings);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .badge-iso {
            background: var(--primary);
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
        }

        .badge-bw {
            background: #e0e0e0;
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .badge-slide {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .badge-c41 {
            background: #ec4899;
            color: #fff;
            box-shadow: 0 2px 10px rgba(236, 72, 153, 0.2);
        }

        .primary-btn {
            background: var(--primary);
            color: #000;
            border: 0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .secondary-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .danger-btn {
            background: transparent;
            color: #ff8b8b;
            border: 1px solid #744;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .view-section.hidden {
            display: none;
        }

        .rolls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 20px 10px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .rolls-header h2 {
            margin: 0;
            font-family: var(--font-headings);
            font-size: 1.4rem;
            color: #fff;
        }

        .rolls-header p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .roll-card {
            cursor: default;
            padding: 0;
            overflow: hidden;
        }

        .roll-card:hover {
            transform: none;
            border-color: #444;
        }

        .roll-card .card-name {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .roll-summary {
            cursor: pointer;
            display: grid;
            gap: 8px;
            list-style: none;
            padding: 15px;
        }

        .roll-summary::-webkit-details-marker {
            display: none;
        }

        .roll-summary-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .roll-summary-hint {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .roll-details-body {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
        }

        .roll-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0;
        }

        .roll-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .rolls-tools {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .rolls-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto 14px;
            padding: 0 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .rolls-search {
            max-width: 1200px;
            margin: 0 auto 12px;
            padding: 0 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .search-field {
            position: relative;
            width: 100%;
        }

        .search-icon {
            color: var(--primary);
            height: 18px;
            left: 14px;
            opacity: 0.9;
            pointer-events: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
        }

        .roll-search-box {
            width: 100%;
            box-sizing: border-box;
            background: #171717;
            border: 1px solid #5b5b5b;
            border-radius: 8px;
            color: #fff;
            padding: 12px 14px 12px 42px;
            font-size: 16px;
        }

        .roll-search-box:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .roll-filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .roll-filter-row::-webkit-scrollbar {
            display: none;
        }

        .roll-filter-btn {
            background: var(--surface);
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
        }

        .status-label {
            align-items: center;
            display: inline-flex;
            gap: 6px;
        }

        .status-icon {
            color: currentColor;
            flex: 0 0 auto;
            height: 15px;
            width: 15px;
        }

        .roll-filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: 700;
        }

        .roll-sort {
            background: #171717;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 9px 10px;
            font-size: 0.9rem;
        }

        .sync-status {
            color: var(--text-secondary);
            font-size: 0.8rem;
            width: 100%;
            text-align: right;
        }

        .roll-result-section {
            grid-column: 1/-1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .roll-result-heading {
            grid-column: 1/-1;
            margin: 8px 0 -4px;
            color: #fff;
            font-family: var(--font-headings);
            font-size: 1rem;
            font-weight: 800;
        }

        .roll-result-heading span {
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 6px;
        }

        .roll-code {
            background: rgba(245, 197, 24, 0.12);
            border: 1px solid rgba(245, 197, 24, 0.35);
            border-radius: 8px;
            color: var(--primary);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 5px 9px;
            white-space: nowrap;
        }

        .profile-line {
            color: var(--text-secondary);
            font-size: 0.82rem;
            margin-top: 6px;
        }

        .form-grid {
            display: grid;
            gap: 14px;
        }

        .form-field label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            box-sizing: border-box;
            background: #171717;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 16px;
        }

        .form-field textarea {
            min-height: 90px;
            resize: vertical;
            font-family: inherit;
        }

        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            color: #777;
            margin-top: 40px;
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 28px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #18181b;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid var(--surface-border);
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        /* Modal Hero Section */
        .modal-hero {
            position: relative;
            padding: 40px 30px 30px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--surface-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .modal-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(24, 24, 27, 0.7) 0%, rgba(24, 24, 27, 0.95) 100%);
            z-index: 1;
        }

        .modal-hero-img {
            max-width: 140px;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
        }

        .modal-hero-text {
            position: relative;
            z-index: 2;
            flex-grow: 1;
        }

        .modal-body {
            padding: 30px;
        }

        .pro-tip-box {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 0 0 30px 0;
        }

        .section-title {
            font-family: var(--font-headings);
            color: #fff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 35px;
            margin-bottom: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .info-item label {
            display: block;
            font-size: 0.75rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            /* Drückt Footer nach unten */
            padding-top: 40px;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding-bottom: 40px;
            background: var(--bg);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid #555;
        }

        footer a:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .disclaimer {
            margin-top: 10px;
            font-size: 0.7rem;
            opacity: 0.6;
            line-height: 1.4;
        }

        @media (max-width: 640px) {
            .rolls-header {
                align-items: stretch;
                flex-direction: column;
            }

            .rolls-controls {
                align-items: stretch;
                flex-direction: column;
            }

            .roll-sort {
                width: 100%;
            }

            .rolls-tools {
                justify-content: stretch;
            }

            .rolls-tools button {
                flex: 1;
            }

            .sync-status {
                text-align: left;
            }

            .roll-card .roll-meta {
                grid-template-columns: 1fr 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>FILM STOCK GUIDE</h1>
        <nav class="top-nav" aria-label="Hauptnavigation">
            <button type="button" id="guideNavBtn" class="nav-btn active" onclick="switchView('guide')">Guide</button>
            <button type="button" id="rollsNavBtn" class="nav-btn" onclick="switchView('rolls')">Rollen</button>
        </nav>
    </header>

    <main>
        <section id="guideView" class="view-section">
            <div class="controls">
                <!-- Suche + Reset -->
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                    <input type="text" id="searchInput" class="search-box"
                        placeholder="Suche... (z.B. 'Farbe', 'Korn', 'Portrait')">
                    <button type="button" class="chip" onclick="resetFilters()">Reset</button>
                </div>

                <!-- Filter Gruppe 1: Einsatz -->
                <div class="filter-section">
                    <span class="filter-label">Einsatz / Motiv</span>
                    <div class="filter-row">
                        <button id="useAllChip" class="chip active" onclick="setFilter('all', this, 'use')">Alle</button>
                        <button class="chip" onclick="setFilter('Portrait', this, 'use')">Portrait</button>
                        <button class="chip" onclick="setFilter('Travel', this, 'use')">Travel</button>
                        <button class="chip" onclick="setFilter('Street', this, 'use')">Street</button>
                        <button class="chip" onclick="setFilter('Landscape', this, 'use')">Landscape</button>
                        <button class="chip" onclick="setFilter('Low Light', this, 'use')">Low Light</button>
                    </div>
                </div>

                <!-- Filter Gruppe 2: Eigenschaften (Exakt wie in Notion) -->
                <div class="filter-section">
                    <span class="filter-label">Eigenschaften</span>
                    <div class="filter-row">
                        <button class="chip" onclick="setFilter('all', this, 'spec')">Alle</button>

                        <!-- Korn -->
                        <button class="chip" onclick="setFilter('Feinkorn', this, 'spec')">Feinkorn</button>
                        <button class="chip" onclick="setFilter('Mittel', this, 'spec')">Korn: Mittel</button>
                        <button class="chip" onclick="setFilter('Klassisch', this, 'spec')">Klassisch</button>
                        <button class="chip" onclick="setFilter('Grob', this, 'spec')">Grob</button>

                        <!-- Trenner -->
                        <div style="width:1px; background:#333; margin:0 5px;"></div>

                        <!-- Budget -->
                        <button class="chip" onclick="setFilter('Budget', this, 'spec')">Budget</button>
                        <button class="chip" onclick="setFilter('Medium', this, 'spec')">Preis: Mittel</button>
                        <button class="chip" onclick="setFilter('Premium', this, 'spec')">Premium</button>
                    </div>
                </div>
            </div>

            <div class="grid" id="grid"></div>
        </section>

        <section id="rollsView" class="view-section hidden">
            <div class="rolls-header">
                <div>
                    <h2>Rollen</h2>
                    <p>Welche Filme gerade in welchen Kameras stecken.</p>
                    <div class="profile-line" id="profileSummary">Kein Profil gesetzt</div>
                </div>
                <div class="rolls-tools">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        let activeFilter = 'all';
        let filterMode = 'use';

        // Diese URL erhältst du aus Google Sheets -> Datei -> Freigeben -> Im Web veröffentlichen -> als CSV
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWjQEwlg8l-bGPZnPcRhw3ydvCHeeOe2tuorRupbLZLrE4ZKfVO7ZdlmNfuHrcz101vFWP4mknKnZg/pub?gid=158929564&single=true&output=csv";
        const ROLLS_KEY = 'filmGuideRolls_v1';
        const USER_PROFILE_KEY = 'filmGuideUserProfile_v1';
        // Nach dem Deploy des Apps Scripts hier die Web-App-URL eintragen.
        const ROLLS_API_URL = 'https://script.google.com/macros/s/AKfycbyTn_dhzqT31XV2QmT_y8d1qjSyJTR5F6BKzqwtfWUU3cwqDFlsDe-QGcDm-FoovydT/exec';
        let filmsData = [];
        let rollsData = [];
        let userProfile = null;
        let rollStatusFilter = 'all';
        let rollSortMode = 'status';
        let rollSearchQuery = '';
        let rollNameWasEdited = false;
        let lastGeneratedRollName = '';

        function hasRollsApi() {
            return Boolean(ROLLS_API_URL && ROLLS_API_URL.trim());
        }

        function withCacheBuster(url) {
            const separator = url.includes('?') ? '&' : '?';
            return `${url}${separator}_=${Date.now()}`;
        }

        function getCsvValue(row, key) {
            return String(row[key] || '').trim();
        }

        function setRollsSyncStatus(message) {
            const status = document.getElementById('rollsSyncStatus');
            if (status) status.textContent = message;
        }

        function cacheRolls() {
            localStorage.setItem(ROLLS_KEY, JSON.stringify(rollsData));
        }

        function normalizeEmail(value) {
            return String(value || '').trim().toLowerCase();
        }

        function loadUserProfile() {
            const savedProfile = localStorage.getItem(USER_PROFILE_KEY);
            if (!savedProfile) {
                userProfile = null;
                updateProfileSummary();
                return;
            }

            try {
                const parsedProfile = JSON.parse(savedProfile);
                userProfile = {
                    name: String(parsedProfile.name || '').trim(),
                    email: normalizeEmail(parsedProfile.email)
                };
            } catch (error) {
                console.error("Fehler beim Lesen des Profils", error);
                userProfile = null;
            }

            updateProfileSummary();
        }

        function saveUserProfile(profile) {
            userProfile = {
                name: String(profile.name || '').trim(),
                email: normalizeEmail(profile.email)
            };
            localStorage.setItem(USER_PROFILE_KEY, JSON.stringify(userProfile));
            updateProfileSummary();
        }

        function hasUserProfile() {
            return Boolean(userProfile && userProfile.email);
        }

        function updateProfileSummary() {
            const profileSummary = document.getElementById('profileSummary');
            if (!profileSummary) return;

            if (hasUserProfile()) {
                profileSummary.textContent = `${userProfile.name || 'Profil'} · ${userProfile.email}`;
            } else {
                profileSummary.textContent = 'Kein Profil gesetzt';
            }
        }

        function requireUserProfile() {
            if (hasUserProfile()) return true;
            openProfileForm();
            return false;
        }

        function attachCurrentUser(roll) {
            if (!hasUserProfile()) return roll;
            return {
                ...roll,
                userEmail: normalizeEmail(roll.userEmail || roll['User Email'] || userProfile.email),
                userName: roll.userName || roll['User Name'] || userProfile.name || ''
            };
        }

        function isCurrentUserRoll(roll) {
            if (!hasUserProfile()) return true;
            const rollEmail = normalizeEmail(roll.userEmail || roll['User Email'] || roll.email || roll.Mail);
            return !rollEmail || rollEmail === userProfile.email;
        }

        function getRollCode(roll) {
            return getRollValue(roll, ['rollCode', 'Roll ID', 'Roll-ID', 'Rollen-ID']);
        }

        function getRollCodeNumber(roll) {
            const match = String(getRollCode(roll) || '').match(/^R(\d+)$/i);
            return match ? Number(match[1]) : 0;
        }

        function formatRollCode(number) {
            return `R${String(number).padStart(3, '0')}`;
        }

        function generateNextRollCode(existingRolls) {
            const highestNumber = existingRolls.reduce((highest, roll) => Math.max(highest, getRollCodeNumber(roll)), 0);
            return formatRollCode(highestNumber + 1);
        }

        function ensureUserRollCodes(rolls) {
            const usedCodes = new Set();
            const nextRolls = [...rolls]
                .sort((a, b) => getRollSortDateValue(a).localeCompare(getRollSortDateValue(b)) || String(a.id || '').localeCompare(String(b.id || '')));
            let nextNumber = nextRolls.reduce((highest, roll) => Math.max(highest, getRollCodeNumber(roll)), 0) + 1;

            nextRolls.forEach(roll => {
                const currentCode = getRollCode(roll);
                if (currentCode && !usedCodes.has(currentCode)) {
                    roll.rollCode = currentCode;
                    usedCodes.add(currentCode);
                    return;
                }

                let nextCode = formatRollCode(nextNumber);
                while (usedCodes.has(nextCode)) {
                    nextNumber += 1;
                    nextCode = formatRollCode(nextNumber);
                }
                roll.rollCode = nextCode;
                usedCodes.add(nextCode);
                nextNumber += 1;
            });

            return rolls;
        }

        function normalizeRollFormat(value) {
            const rawFormat = String(value || '').trim();
            const compactFormat = rawFormat.toLowerCase().replace(/\s+/g, '');
            if (!compactFormat) return '';
            if (compactFormat === '35mm' || compactFormat === '35' || compactFormat === '135mm') return '135';
            if (compactFormat === '120mm') return '120';
            if (compactFormat.includes('4x5') || compactFormat.includes('4×5')) return '4x5';
            if (compactFormat.includes('8x10') || compactFormat.includes('8×10')) return '8x10';
            if (compactFormat.includes('instax')) return 'Instax';
            return rawFormat;
        }

        function mergeSyncedRolls(syncedRolls) {
            const mergedRolls = syncedRolls
                .filter(roll => roll && roll.id)
                .filter(isCurrentUserRoll)
                .map(serverRoll => {
                    const localRoll = rollsData.find(item => item.id === serverRoll.id) || {};
                    const mergedRoll = attachCurrentUser({ ...localRoll, ...serverRoll });

                    ['format', 'ratedIso', 'note', 'process', 'rollCode'].forEach(key => {
                        if (!serverRoll[key] && localRoll[key]) {
                            mergedRoll[key] = localRoll[key];
                        }
                    });

                    if (!serverRoll.loadedAt && localRoll.loadedAt) mergedRoll.loadedAt = localRoll.loadedAt;
                    if (!serverRoll.createdAt && localRoll.createdAt) mergedRoll.createdAt = localRoll.createdAt;
                    if (!serverRoll.updatedAt && localRoll.updatedAt) mergedRoll.updatedAt = localRoll.updatedAt;
                    mergedRoll.format = normalizeRollFormat(mergedRoll.format);
                    return mergedRoll;
                });
            return ensureUserRollCodes(mergedRolls);
        }

        function loadRolls() {
            const savedRolls = localStorage.getItem(ROLLS_KEY);
            if (!savedRolls) {
                rollsData = [];
                renderRolls();
            } else {
                try {
                    rollsData = JSON.parse(savedRolls)
                        .filter(isCurrentUserRoll)
                        .map(attachCurrentUser);
                    ensureUserRollCodes(rollsData);
                    cacheRolls();
                } catch (e) {
                    console.error("Fehler beim Lesen der Rollen", e);
                    rollsData = [];
                }

                renderRolls();
            }

            fetchRollsFromSync({ silent: true });
        }

        function saveRolls() {
            cacheRolls();
            renderRolls();
        }

        async function fetchRollsFromSync(options = {}) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            if (!options.silent) setRollsSyncStatus('Synchronisiere...');

            try {
                const response = await fetch(`${ROLLS_API_URL}?action=list&userEmail=${encodeURIComponent(userProfile.email)}&ts=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                const nextRolls = Array.isArray(payload) ? payload : (payload.rolls || []);
                rollsData = mergeSyncedRolls(nextRolls);
                cacheRolls();
                renderRolls();
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Synchronisieren der Rollen", error);
                setRollsSyncStatus('Offline: lokaler Stand');
            }
        }

        async function syncRollMutation(action, roll) {
            if (!requireUserProfile()) {
                setRollsSyncStatus('Profil fehlt');
                return;
            }

            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            setRollsSyncStatus('Speichere...');

            try {
                const response = await fetch(ROLLS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action,
                        roll: roll ? attachCurrentUser(roll) : null,
                        id: roll ? roll.id : '',
                        userEmail: userProfile.email
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (payload.ok === false) throw new Error(payload.error || 'Sync failed');
                if (payload.rolls) {
                    rollsData = mergeSyncedRolls(payload.rolls);
                    cacheRolls();
                    renderRolls();
                }
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Speichern der Rolle", error);
                setRollsSyncStatus('Nicht synchronisiert');
            }
        }

        function switchView(viewName) {
            const showGuide = viewName === 'guide';
            document.getElementById('guideView').classList.toggle('hidden', !showGuide);
            document.getElementById('rollsView').classList.toggle('hidden', showGuide);
            document.getElementById('guideNavBtn').classList.toggle('active', showGuide);
            document.getElementById('rollsNavBtn').classList.toggle('active', !showGuide);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getFilmById(filmId) {
            return filmsData.find(film => film.id === filmId);
        }

        function formatTodayForInput() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function isValidDatePart(year, month, day) {
            const fullYear = Number(year);
            const monthNumber = Number(month);
            const dayNumber = Number(day);
            return fullYear >= 1900 &&
                fullYear <= 2100 &&
                monthNumber >= 1 &&
                monthNumber <= 12 &&
                dayNumber >= 1 &&
                dayNumber <= 31;
        }

        function parseGoogleSheetsDateSerial(value) {
            const serial = Number(value);
            if (!Number.isFinite(serial) || serial < 20000 || serial > 80000) return null;

            const date = new Date(Date.UTC(1899, 11, 30) + Math.floor(serial) * 86400000);
            return {
                year: date.getUTCFullYear(),
                month: date.getUTCMonth() + 1,
                day: date.getUTCDate()
            };
        }

        function parseRollDateParts(dateValue) {
            if (!dateValue) return null;
            const rawDate = String(dateValue).trim();

            if (/^\d+(\.\d+)?$/.test(rawDate)) {
                return parseGoogleSheetsDateSerial(rawDate);
            }

            const isoMatch = rawDate.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (isoMatch && isValidDatePart(isoMatch[1], isoMatch[2], isoMatch[3])) {
                return {
                    year: Number(isoMatch[1]),
                    month: Number(isoMatch[2]),
                    day: Number(isoMatch[3])
                };
            }

            const shortIsoMatch = rawDate.match(/^(\d{2})-(\d{1,2})-(\d{1,2})$/);
            if (shortIsoMatch && isValidDatePart(`20${shortIsoMatch[1]}`, shortIsoMatch[2], shortIsoMatch[3])) {
                return {
                    year: Number(`20${shortIsoMatch[1]}`),
                    month: Number(shortIsoMatch[2]),
                    day: Number(shortIsoMatch[3])
                };
            }

            const swissMatch = rawDate.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
            if (swissMatch) {
                const year = swissMatch[3].length === 2 ? `20${swissMatch[3]}` : swissMatch[3];
                if (isValidDatePart(year, swissMatch[2], swissMatch[1])) {
                    return {
                        year: Number(year),
                        month: Number(swissMatch[2]),
                        day: Number(swissMatch[1])
                    };
                }
            }

            const parsedDate = new Date(rawDate);
            if (!Number.isNaN(parsedDate.getTime()) && isValidDatePart(parsedDate.getFullYear(), parsedDate.getMonth() + 1, parsedDate.getDate())) {
                return {
                    year: parsedDate.getFullYear(),
                    month: parsedDate.getMonth() + 1,
                    day: parsedDate.getDate()
                };
            }

            return null;
        }

        function formatRollDateParts(parts, yearMode = 'short') {
            if (!parts) return '';
            const year = yearMode === 'full' ? String(parts.year) : String(parts.year).slice(-2);
            const month = String(parts.month).padStart(2, '0');
            const day = String(parts.day).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateForRollName(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'short');
        }

        function formatDateForDisplay(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'short') || 'Kein Datum';
        }

        function formatDateForInputValue(dateValue) {
            return formatRollDateParts(parseRollDateParts(dateValue), 'full') || formatTodayForInput();
        }

        function getRollDateValue(roll) {
            return roll.loadedAt ||
                roll.loaded_at ||
                roll['Loaded at'] ||
                roll['loaded at'] ||
                roll['Datum'] ||
                roll.createdAt ||
                roll.created_at ||
                roll['Created at'] ||
                roll['created at'] ||
                roll.updatedAt ||
                roll.updated_at ||
                roll['Updated at'] ||
                roll['updated at'];
        }

        function getRollValue(roll, keys) {
            for (const key of keys) {
                if (roll[key]) return roll[key];
            }
            return '';
        }

        function getRollFormat(roll) {
            return normalizeRollFormat(getRollValue(roll, ['format', 'Format']));
        }

        function getRollRatedIso(roll) {
            return getRollValue(roll, ['ratedIso', 'ratedISO', 'ISO eingestellt', 'ISO geratet', 'Rated ISO']);
        }

        function getRollNote(roll) {
            return getRollValue(roll, ['note', 'Notiz', 'notes']);
        }

        function getRollProcess(roll) {
            return getRollValue(roll, ['process', 'Prozess', 'Entwicklung']);
        }

        function rollNamePart(value, fallback) {
            const source = String(value || fallback || '').trim();
            return source
                .replace(/[^a-zA-Z0-9äöüÄÖÜß]+/g, '_')
                .replace(/^_+|_+$/g, '') || fallback;
        }

        function buildRollName(dateValue, filmName, cameraName) {
            const datePart = formatDateForRollName(dateValue) || formatDateForRollName(formatTodayForInput());
            const filmPart = rollNamePart(filmName, 'Film');
            const cameraPart = rollNamePart(cameraName, 'Kamera');
            return `${datePart}_${filmPart}_${cameraPart}`;
        }

        function prepareData() {
            if (!filmsData || filmsData.length === 0) {
                document.getElementById('grid').innerHTML =
                    '<div style="text-align:center; color:#777; width:100%; grid-column:1/-1;">Lade Filme aus der Datenbank...</div>';
                return;
            }

            filmsData.forEach(film => {
                if (!film.keywords) film.keywords = [];

                // 1. Alle Specs aus Notion (z.B. "Premium", "Grob") suchbar machen
                if (film.specs) {
                    Object.values(film.specs).forEach(val => {
                        if (val) film.keywords.push(val);
                    });
                }

                // 2. Intelligente Synonyme (Mapping)

                // Korn Synonyme
                if (film.specs.grain === "Klassisch" || film.specs.grain === "Grob") {
                    film.keywords.push("Grain", "Korn", "Stark");
                }

                // Budget Synonyme
                if (film.specs.budget === "Budget") {
                    film.keywords.push("Günstig", "Billig", "Cheap");
                }
                if (film.specs.budget === "Premium") {
                    film.keywords.push("Teuer", "Pro", "Professional", "Profi");
                }

                // Sicherstellen, dass Bildpfad existiert
                if (!film.img) film.img = "";
            });

            renderGrid(filmsData);
            renderRolls();
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML =
                    `<div style="grid-column: 1/-1; text-align: center; color: #777; margin-top: 40px;">Keine Filme gefunden.</div>`;
                return;
            }

            data.forEach(film => {
                let badgeClass = "badge-iso";
                // Check für Typ (inkl. Schreibweisen wie "SW" oder "B&W")
                if (film.type && (film.type.includes("B&W") || film.type.includes("SW"))) badgeClass = "badge-bw";
                if (film.type && (film.type.includes("Slide") || film.type.includes("Dia"))) badgeClass = "badge-slide";

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(film);

                const highlightClass = (val) => (val === activeFilter) ? 'highlight' : '';

                card.innerHTML = `
                <!-- BILD (Packshot Style) -->
                <div class="card-img-container">
                    <img src="${film.img}" 
                         alt="${film.name}" 
                         class="card-img" 
                         onerror="this.parentNode.style.display='none'">
                </div>

                <div class="card-top">
                    <span class="card-brand">${film.brand}</span>
                    <span class="badge ${badgeClass}">${film.process}</span>
                </div>
                <h3 class="card-name">
                    ${film.name}
                    <span style="font-size:0.6em; color:var(--primary); vertical-align:middle; margin-left:5px;">
                        ISO ${film.iso}
                    </span>
                </h3>
                <p class="card-short-desc">${film.shortDesc}</p>
                <div class="spec-tags">
                    <span class="spec-tag ${highlightClass(film.specs.grain)}">${film.specs.grain}</span>
                    <span class="spec-tag ${highlightClass(film.specs.handling)}">${film.specs.handling}</span>
                    <span class="spec-tag ${highlightClass(film.specs.budget)}">${film.specs.budget}</span>
                </div>
            `;
                grid.appendChild(card);
            });
        }

        function setFilter(filterValue, btnElement, mode) {
            activeFilter = filterValue;
            filterMode = mode;

            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btnElement.classList.add('active');

            executeSearch();
        }

        function executeSearch() {
            const rawQuery = document.getElementById('searchInput').value.toLowerCase();
            const query = rawQuery.trim();

            const filtered = filmsData.filter(film => {
                const searchableText = [
                    film.name,
                    film.brand,
                    film.shortDesc,
                    film.process,
                    film.type,
                    film.keywords.join(" "),
                    film.uses.join(" ")
                ].join(" ").toLowerCase();

                const textMatch = searchableText.includes(query);

                let catMatch = true;
                if (activeFilter !== 'all') {
                    if (filterMode === 'use') {
                        // Prüfen ob einer der Uses matcht
                        catMatch = film.uses.some(u => u === activeFilter || u.includes(activeFilter));
                    } else if (filterMode === 'spec') {
                        // Prüfen ob eine der Specs matcht
                        const specsValues = Object.values(film.specs);
                        catMatch = specsValues.includes(activeFilter);
                    }
                }

                return textMatch && catMatch;
            });

            renderGrid(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', executeSearch);

        function resetFilters() {
            const search = document.getElementById('searchInput');
            search.value = '';

            activeFilter = 'all';
            filterMode = 'use';

            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

            const allUseChip = document.getElementById('useAllChip');
            if (allUseChip) {
                allUseChip.classList.add('active');
            }

            renderGrid(filmsData);
        }

        function setRollStatusFilter(status) {
            rollStatusFilter = status;
            document.querySelectorAll('.roll-filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.rollStatus === status);
            });
            renderRolls();
        }

        function getStatusIcon(status) {
            const normalizedStatus = status || 'In Kamera';
            if (normalizedStatus === 'Belichtet') {
                return '<svg class="status-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9 7 7M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path></svg>';
            }
            if (normalizedStatus === 'Entwickelt') {
                return '<svg class="status-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12.5 9 17l11-11" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3"></path></svg>';
            }
            if (normalizedStatus === 'all') {
                return '<svg class="status-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path></svg>';
            }
            return '<svg class="status-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2"></path><circle cx="9" cy="12" r="1.6" fill="currentColor"></circle><circle cx="15" cy="12" r="1.6" fill="currentColor"></circle></svg>';
        }

        function formatStatusLabel(status) {
            const label = status === 'all' ? 'Alle' : (status || 'In Kamera');
            return `<span class="status-label">${getStatusIcon(status)}<span>${escapeHtml(label)}</span></span>`;
        }

        function setRollSortMode(mode) {
            rollSortMode = mode;
            renderRolls();
        }

        function setRollSearchQuery(value) {
            rollSearchQuery = String(value || '').trim().toLowerCase();
            renderRolls();
        }

        function getRollSearchText(roll) {
            const film = getFilmById(roll.filmId);
            return [
                getRollCode(roll),
                roll.name,
                roll.status,
                roll.camera,
                roll.filmName,
                film ? film.brand : '',
                film ? film.name : '',
                film ? film.process : '',
                getRollDateValue(roll),
                formatDateForDisplay(getRollDateValue(roll)),
                formatRollDateParts(parseRollDateParts(getRollDateValue(roll)), 'full'),
                getRollFormat(roll),
                getRollRatedIso(roll),
                getRollProcess(roll),
                getRollNote(roll)
            ].join(' ').toLowerCase();
        }

        function rollMatchesSearch(roll) {
            if (!rollSearchQuery) return true;
            return getRollSearchText(roll).includes(rollSearchQuery);
        }

        function getRollSortDateValue(roll) {
            return formatRollDateParts(parseRollDateParts(getRollDateValue(roll)), 'full') || String(getRollDateValue(roll) || '');
        }

        function compareRollDateDesc(a, b) {
            return getRollSortDateValue(b).localeCompare(getRollSortDateValue(a));
        }

        function compareRollDateAsc(a, b) {
            return getRollSortDateValue(a).localeCompare(getRollSortDateValue(b));
        }

        function sortRollsForSearchGroup(status, rolls) {
            const sortedRolls = [...rolls];
            if (status === 'Belichtet') {
                return sortedRolls.sort(compareRollDateAsc);
            }
            if (status === 'Entwickelt') {
                return sortedRolls.sort(compareRollDateDesc);
            }
            return sortedRolls.sort((a, b) => String(a.camera || '').localeCompare(String(b.camera || '')) || compareRollDateDesc(a, b));
        }

        function renderRollCard(roll) {
            const film = getFilmById(roll.filmId);
            const rollDate = getRollDateValue(roll);
            const format = getRollFormat(roll);
            const ratedIso = getRollRatedIso(roll);
            const note = getRollNote(roll);
            const process = getRollProcess(roll);
            const rollCode = getRollCode(roll);
            const card = document.createElement('div');
            card.className = 'card roll-card';
            card.innerHTML = `
                <details>
                    <summary class="roll-summary">
                        <div class="roll-summary-top">
                            <span class="card-brand">${formatStatusLabel(roll.status || 'In Kamera')}</span>
                            <span class="roll-code">${escapeHtml(rollCode)}</span>
                        </div>
                        <h3 class="card-name">${escapeHtml(roll.name)}</h3>
                        <span class="roll-summary-hint">${escapeHtml(formatDateForDisplay(rollDate))} · Details anzeigen</span>
                    </summary>
                    <div class="roll-details-body">
                        <p class="card-short-desc">${escapeHtml(film ? `${film.brand} ${film.name}` : roll.filmName)}</p>
                        <div class="roll-meta">
                            <div class="info-card"><div class="info-item"><label>Roll-ID</label><span>${escapeHtml(rollCode)}</span></div></div>
                            <div class="info-card"><div class="info-item"><label>Kamera</label><span>${escapeHtml(roll.camera || 'Nicht gesetzt')}</span></div></div>
                            <div class="info-card"><div class="info-item"><label>Format</label><span>${escapeHtml(format || 'Nicht gesetzt')}</span></div></div>
                            <div class="info-card"><div class="info-item"><label>ISO eingestellt</label><span>${escapeHtml(ratedIso || 'Nicht gesetzt')}</span></div></div>
                            <div class="info-card"><div class="info-item"><label>Entwicklung</label><span>${escapeHtml(process || (film ? film.process : '') || 'Nicht gesetzt')}</span></div></div>
                        </div>
                        ${note ? `<p class="card-short-desc" style="margin-bottom:14px;">${escapeHtml(note)}</p>` : ''}
                        <div class="roll-actions">
                            ${film ? `<button type="button" class="secondary-btn" onclick="openModal(getFilmById('${escapeHtml(roll.filmId)}'))">Guide öffnen</button>` : ''}
                            <button type="button" class="secondary-btn" onclick="openRollForm('${escapeHtml(roll.filmId)}', '${escapeHtml(roll.id)}')">Bearbeiten</button>
                            <button type="button" class="danger-btn" onclick="deleteRoll('${escapeHtml(roll.id)}')">Löschen</button>
                        </div>
                    </div>
                </details>
            `;
            return card;
        }

        function renderRolls() {
            const grid = document.getElementById('rollsGrid');
            if (!grid) return;

            grid.innerHTML = '';

            if (!hasUserProfile()) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Profil fehlt.</strong><br>
                        Lege ein Profil mit Name und Mail an, damit nur deine Rollen angezeigt werden.<br><br>
                        <button type="button" class="primary-btn" onclick="openProfileForm()">Profil anlegen</button>
                    </div>
                `;
                return;
            }

            if (rollsData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Noch keine Rollen.</strong><br>
                        Lege eine Rolle direkt aus einem Film im Guide an.
                    </div>
                `;
                return;
            }

            const statusRank = { "In Kamera": 1, "Belichtet": 2, "Entwickelt": 3 };
            const visibleRolls = rollsData
                .filter(roll => rollStatusFilter === 'all' || roll.status === rollStatusFilter)
                .filter(rollMatchesSearch);

            if (visibleRolls.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Keine Rollen gefunden.</strong><br>
                        Passe Suche oder Filter an.
                    </div>
                `;
                return;
            }

            if (rollSearchQuery) {
                ['In Kamera', 'Belichtet', 'Entwickelt'].forEach(status => {
                    const groupRolls = sortRollsForSearchGroup(status, visibleRolls.filter(roll => (roll.status || 'In Kamera') === status));
                    if (groupRolls.length === 0) return;

                    const section = document.createElement('section');
                    section.className = 'roll-result-section';
                    section.innerHTML = `<h3 class="roll-result-heading">${escapeHtml(status)} <span>${groupRolls.length}</span></h3>`;
                    groupRolls.forEach(roll => section.appendChild(renderRollCard(roll)));
                    grid.appendChild(section);
                });
                return;
            }

            const sortedRolls = [...visibleRolls].sort((a, b) => {
                if (rollSortMode === 'date') {
                    return compareRollDateDesc(a, b);
                }
                if (rollSortMode === 'camera') {
                    return String(a.camera || '').localeCompare(String(b.camera || ''));
                }
                if (rollSortMode === 'film') {
                    return String(a.filmName || '').localeCompare(String(b.filmName || ''));
                }
                if (rollSortMode === 'format') {
                    return String(getRollFormat(a) || '').localeCompare(String(getRollFormat(b) || ''));
                }

                const byStatus = (statusRank[a.status] || 9) - (statusRank[b.status] || 9);
                if (byStatus !== 0) return byStatus;
                return compareRollDateDesc(a, b);
            });

            sortedRolls.forEach(roll => {
                grid.appendChild(renderRollCard(roll));
            });
        }

            if (!requireUserProfile()) return;

            const fallbackFilmName = existingRoll ? getRollValue(existingRoll, ['filmName', 'Film']) : '';
            const film = getFilmById(filmId) || filmsData.find(item => item.name === fallbackFilmName) || null;
            const loadedAt = existingRoll ? formatDateForInputValue(getRollDateValue(existingRoll)) : formatTodayForInput();
            const camera = existingRoll ? existingRoll.camera : '';
            const filmName = existingRoll ? existingRoll.filmName : (film ? film.name : '');
            const selectedFormat = existingRoll ? getRollFormat(existingRoll) : (film && film.formats.length === 1 ? normalizeRollFormat(film.formats[0]) : '');
            const ratedIso = existingRoll ? getRollRatedIso(existingRoll) : (film && film.iso ? String(film.iso) : '');
            const note = existingRoll ? getRollNote(existingRoll) : '';
            const process = existingRoll ? getRollProcess(existingRoll) : (film ? film.process : '');

            const formatOptions = formatChoices.map(format => `<option value="${escapeHtml(format)}" ${format === selectedFormat ? 'selected' : ''}>${escapeHtml(format)}</option>`).join('');

            rollNameWasEdited = Boolean(existingRoll);

            contentBlock.innerHTML = `
                <button class="close-btn" onclick="closeModal(null)">&times;</button>

                    <h2 style="font-family: var(--font-headings); font-weight:800; margin: 5px 0 24px; font-size: 2rem; color: #fff; line-height:1.1;">${escapeHtml(filmName || 'Film wählen')}</h2>

                        </div>
                        <div class="form-field">
                            <label for="rollFormat">Format</label>
                            <select id="rollFormat" required>
                                <option value="">Format wählen</option>
                                ${formatOptions}
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="rollRatedIso">ISO eingestellt</label>
                            <input id="rollRatedIso" type="number" inputmode="numeric" value="${escapeHtml(ratedIso)}" placeholder="z.B. 200">

                        <div class="form-field">
                            <label for="rollName">Roll-Name</label>
                            <input id="rollName" type="text" value="${escapeHtml(rollName)}" oninput="rollNameWasEdited = true" required>

                            </select>

                        <input id="rollProcess" type="hidden" value="${escapeHtml(process)}">
                        <button type="submit" class="primary-btn">Speichern</button>
                    </form>
                </div>
            `;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function syncRollNameDefault() {
            const rollNameInput = document.getElementById('rollName');
            const filmNameInput = document.getElementById('rollFilmName');
            const cameraInput = document.getElementById('rollCamera');
            const dateInput = document.getElementById('rollLoadedAt');
            if (!rollNameInput || !filmNameInput || !cameraInput || !dateInput) return;

            if (rollNameInput.value !== lastGeneratedRollName) {
                rollNameWasEdited = true;
            }

            const nextName = buildRollName(dateInput.value, filmNameInput.value, cameraInput.value);
            if (!rollNameWasEdited || rollNameInput.value === lastGeneratedRollName) {
                rollNameInput.value = nextName;
                rollNameWasEdited = false;
            }
            lastGeneratedRollName = nextName;
        }

        async function saveRollFromForm(event, rollId, filmId) {
            event.preventDefault();

            const film = getFilmById(filmId);
            const name = document.getElementById('rollName').value.trim();
            const camera = document.getElementById('rollCamera').value.trim();
            const loadedAt = document.getElementById('rollLoadedAt').value;
            const filmName = document.getElementById('rollFilmName').value.trim();
            const format = normalizeRollFormat(document.getElementById('rollFormat').value);
            const ratedIso = document.getElementById('rollRatedIso').value.trim();
            const note = document.getElementById('rollNote').value.trim();
            const process = document.getElementById('rollProcess').value.trim();
            const status = document.getElementById('rollStatus').value;
            const existingRoll = rollId ? rollsData.find(item => item.id === rollId) : null;
            const rollCode = existingRoll ? getRollCode(existingRoll) : (document.getElementById('rollCode').value.trim() || generateNextRollCode(rollsData));
            const roll = {
                id: rollId || `roll_${Date.now()}`,
                rollCode,
                filmId: film ? film.id : '',
                filmName: film ? film.name : filmName,
                name: name || buildRollName(loadedAt, filmName, camera),
                camera,
                loadedAt,
                format,
                ratedIso,
                note,
                process,
                status,
                createdAt: existingRoll ? getRollValue(existingRoll, ['createdAt', 'created_at', 'Created at', 'created at']) : '',
                updatedAt: new Date().toISOString(),
                userEmail: userProfile.email,
                userName: userProfile.name || ''
            };

            if (rollId) {
                rollsData = rollsData.map(item => item.id === rollId ? roll : item);
            } else {
                roll.createdAt = roll.updatedAt;
                rollsData.unshift(roll);
            }

            saveRolls();
            closeModal(null);
            switchView('rolls');
            await syncRollMutation('upsert', roll);
        }

        async function deleteRoll(rollId) {
            const roll = rollsData.find(item => item.id === rollId);
            if (!roll) return;
            if (!window.confirm(`Rolle "${roll.name}" löschen?`)) return;
            rollsData = rollsData.filter(item => item.id !== rollId);
            saveRolls();
            await syncRollMutation('delete', { id: rollId });
        }

        // Initialer Lade-Aufruf statt statischem `prepareData()`
        function loadFilmsFromGoogleSheet() {
            // Erstmal Lade-Text anzeigen
            prepareData();

            Papa.parse(withCacheBuster(SHEET_CSV_URL), {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    const data = results.data;
                    console.log("Daten aus Google Sheets:", data);

                    filmsData = data.map(row => {
                        return {
                            id: getCsvValue(row, "ID") || getCsvValue(row, "Name").toLowerCase().replace(/\s+/g, '-'),
                            brand: getCsvValue(row, "Marke"),
                            name: getCsvValue(row, "Name"),
                            img: getCsvValue(row, "Bilder") ? 'img/' + getCsvValue(row, "Bilder") : "", // Wir bauen weiter auf dem img/ Ordner
                            iso: parseInt(getCsvValue(row, "ISO")) || 0,
                            type: getCsvValue(row, "Typ"),
                            // Formate & Einsatz als Array trennen und normalisieren, z.B. "35mm" -> "135"
                            formats: getCsvValue(row, "Formate") ? getCsvValue(row, "Formate").split(",").map(s => normalizeRollFormat(s)).filter(Boolean) : [],
                            process: getCsvValue(row, "Typ") === "B&W" ? "B&W" : (getCsvValue(row, "Typ") === "Slide" ? "E-6" : "C-41"),
                            shortDesc: getCsvValue(row, "Kurzbeschreibung"),
                            specs: {
                                grain: getCsvValue(row, "Grain"),
                                handling: getCsvValue(row, "Handling"),
                                saturation: getCsvValue(row, "Sättigung"),
                                budget: getCsvValue(row, "Budget")
                            },
                            uses: getCsvValue(row, "Einsatz") ? getCsvValue(row, "Einsatz").split(",").map(s => s.trim()) : [],
                            keywords: [],
                            look: {
                                desc: getCsvValue(row, "Look Beschreibung")
                            },
                            tips: {
                                exposure: getCsvValue(row, "Tipp: Belichtung"),
                                scanning: getCsvValue(row, "Tipp: Scan"),
                                dev: getCsvValue(row, "Tipp: Dev")
                            }
                        };
                    });

                    // Nach dem Mapping bereiten wir die Daten für das Frontend vor
                    prepareData();
                },
                error: function (error) {
                    console.error("Fehler beim Laden:", error);
                    document.getElementById('grid').innerHTML = '<div style="color:red; text-align:center; grid-column:1/-1;">Fehler beim Laden der Filmdaten. Bitte überprüfe die Google Sheets URL.</div>';
                }
            });
        }

        // Direkt starten
        loadUserProfile();
        loadRolls();
        loadFilmsFromGoogleSheet();
    </script>

</body>

</html>
