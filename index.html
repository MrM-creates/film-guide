<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Stock Guide</title>

    <!-- App Icon für iPhone/Android -->
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Outfit (Überschriften) & Inter (Fließtext) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-hover: #2c2c2c;
            --primary: #f5c518;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --tag-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 16px 20px 14px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: 700;
        }

        .controls {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .search-box {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: var(--surface);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .filter-section {
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .filter-label {
            font-size: 0.75rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: var(--surface);
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: #777;
            color: #fff;
        }

        .chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        /* PACKSHOT STYLE (Bilder) */
        .card-img-container {
            width: 100%;
            height: 160px;
            background: transparent;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .card-img {
            transform: scale(1.08) translateY(-4px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .card-brand {
            font-family: var(--font-headings);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card-name {
            font-family: var(--font-headings);
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px 0;
            line-height: 1.1;
        }

        .card-short-desc {
            font-size: 0.95rem;
            color: #c0c0c8;
            margin-bottom: 20px;
            line-height: 1.5;
            flex-grow: 1;
            font-weight: 400;
        }

        .spec-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .spec-tag {
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--tag-bg);
            padding: 4px 10px;
            border-radius: 6px;
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spec-tag.highlight {
            color: var(--primary);
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.05);
        }

        .badge {
            font-family: var(--font-headings);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .badge-iso {
            background: var(--primary);
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
        }

        .badge-bw {
            background: #e0e0e0;
            color: #000;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .badge-slide {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .badge-c41 {
            background: #ec4899;
            color: #fff;
            box-shadow: 0 2px 10px rgba(236, 72, 153, 0.2);
        }

        .primary-btn {
            background: var(--primary);
            color: #000;
            border: 0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .secondary-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .danger-btn {
            background: transparent;
            color: #ff8b8b;
            border: 1px solid #744;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .view-section.hidden {
            display: none;
        }

        .rolls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 20px 10px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .rolls-header h2 {
            margin: 0;
            font-family: var(--font-headings);
            font-size: 1.4rem;
            color: #fff;
        }

        .rolls-header p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .roll-card {
            cursor: default;
        }

        .roll-card:hover {
            transform: none;
            border-color: #444;
        }

        .roll-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0;
        }

        .roll-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .rolls-tools {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .sync-status {
            color: var(--text-secondary);
            font-size: 0.8rem;
            width: 100%;
            text-align: right;
        }

        .form-grid {
            display: grid;
            gap: 14px;
        }

        .form-field label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-field input,
        .form-field select {
            width: 100%;
            box-sizing: border-box;
            background: #171717;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 16px;
        }

        .form-field input:focus,
        .form-field select:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            color: #777;
            margin-top: 40px;
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 28px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #18181b;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid var(--surface-border);
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        /* Modal Hero Section */
        .modal-hero {
            position: relative;
            padding: 40px 30px 30px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--surface-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .modal-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(24, 24, 27, 0.7) 0%, rgba(24, 24, 27, 0.95) 100%);
            z-index: 1;
        }

        .modal-hero-img {
            max-width: 140px;
            max-height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
        }

        .modal-hero-text {
            position: relative;
            z-index: 2;
            flex-grow: 1;
        }

        .modal-body {
            padding: 30px;
        }

        .pro-tip-box {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 0 0 30px 0;
        }

        .section-title {
            font-family: var(--font-headings);
            color: #fff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 35px;
            margin-bottom: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .info-item label {
            display: block;
            font-size: 0.75rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            /* Drückt Footer nach unten */
            padding-top: 40px;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding-bottom: 40px;
            background: var(--bg);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid #555;
        }

        footer a:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .disclaimer {
            margin-top: 10px;
            font-size: 0.7rem;
            opacity: 0.6;
            line-height: 1.4;
        }

        @media (max-width: 640px) {
            .rolls-header {
                align-items: stretch;
                flex-direction: column;
            }

            .rolls-tools {
                justify-content: stretch;
            }

            .rolls-tools button {
                flex: 1;
            }

            .sync-status {
                text-align: left;
            }

            .roll-meta,
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>FILM STOCK GUIDE</h1>
        <nav class="top-nav" aria-label="Hauptnavigation">
            <button type="button" id="guideNavBtn" class="nav-btn active" onclick="switchView('guide')">Guide</button>
            <button type="button" id="rollsNavBtn" class="nav-btn" onclick="switchView('rolls')">Rollen</button>
        </nav>
    </header>

    <main>
        <section id="guideView" class="view-section">
            <div class="controls">
                <!-- Suche + Reset -->
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                    <input type="text" id="searchInput" class="search-box"
                        placeholder="Suche... (z.B. 'Farbe', 'Korn', 'Portrait')">
                    <button type="button" class="chip" onclick="resetFilters()">Reset</button>
                </div>

                <!-- Filter Gruppe 1: Einsatz -->
                <div class="filter-section">
                    <span class="filter-label">Einsatz / Motiv</span>
                    <div class="filter-row">
                        <button id="useAllChip" class="chip active" onclick="setFilter('all', this, 'use')">Alle</button>
                        <button class="chip" onclick="setFilter('Portrait', this, 'use')">Portrait</button>
                        <button class="chip" onclick="setFilter('Travel', this, 'use')">Travel</button>
                        <button class="chip" onclick="setFilter('Street', this, 'use')">Street</button>
                        <button class="chip" onclick="setFilter('Landscape', this, 'use')">Landscape</button>
                        <button class="chip" onclick="setFilter('Low Light', this, 'use')">Low Light</button>
                    </div>
                </div>

                <!-- Filter Gruppe 2: Eigenschaften (Exakt wie in Notion) -->
                <div class="filter-section">
                    <span class="filter-label">Eigenschaften</span>
                    <div class="filter-row">
                        <button class="chip" onclick="setFilter('all', this, 'spec')">Alle</button>

                        <!-- Korn -->
                        <button class="chip" onclick="setFilter('Feinkorn', this, 'spec')">Feinkorn</button>
                        <button class="chip" onclick="setFilter('Mittel', this, 'spec')">Korn: Mittel</button>
                        <button class="chip" onclick="setFilter('Klassisch', this, 'spec')">Klassisch</button>
                        <button class="chip" onclick="setFilter('Grob', this, 'spec')">Grob</button>

                        <!-- Trenner -->
                        <div style="width:1px; background:#333; margin:0 5px;"></div>

                        <!-- Budget -->
                        <button class="chip" onclick="setFilter('Budget', this, 'spec')">Budget</button>
                        <button class="chip" onclick="setFilter('Medium', this, 'spec')">Preis: Mittel</button>
                        <button class="chip" onclick="setFilter('Premium', this, 'spec')">Premium</button>
                    </div>
                </div>
            </div>

            <div class="grid" id="grid"></div>
        </section>

        <section id="rollsView" class="view-section hidden">
            <div class="rolls-header">
                <div>
                    <h2>Rollen</h2>
                    <p>Welche Filme gerade in welchen Kameras stecken.</p>
                </div>
                <div class="rolls-tools">
                    <button type="button" class="secondary-btn" onclick="fetchRollsFromSync()">Sync</button>
                    <button type="button" class="primary-btn" onclick="openEmptyRollForm()">Rolle anlegen</button>
                    <span class="sync-status" id="rollsSyncStatus">Lokal gespeichert</span>
                </div>
            </div>
            <div class="grid" id="rollsGrid"></div>
        </section>
    </main>

    <!-- FOOTER (Variante A) -->
    <footer>
        <p>
            Made with 🎞️ & Code by <strong>MrM</strong> |
            <a href="mailto:deine-email@example.com">Feedback</a>
        </p>
        <p class="disclaimer">
            Alle Angaben basieren auf Erfahrungswerten und sind ohne Gewähr.<br>
            Entwicklung & Belichtung auf eigene Gefahr.
        </p>
    </footer>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(null)">&times;</button>
            <div class="modal-header" id="modalHeader"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        let activeFilter = 'all';
        let filterMode = 'use';

        // Diese URL erhältst du aus Google Sheets -> Datei -> Freigeben -> Im Web veröffentlichen -> als CSV
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQM0mtgFQ8vdcCsFCQPWBrcg0d-kNgUgJO1Sf_gH2qpCbGpDtsIJaPysqqXUBB1_-C5_4FhbUymRkBB/pub?output=csv&gid=0";
        const ROLLS_KEY = 'filmGuideRolls_v1';
        // Nach dem Deploy des Apps Scripts hier die Web-App-URL eintragen.
        const ROLLS_API_URL = 'https://script.google.com/macros/s/AKfycbydvznEWiep5zSacKZtXPTLV9apm9OqxvciB5mEXuUG1TmQuU6cRH7LfzVVtvb1KWCXtA/exec';
        let filmsData = [];
        let rollsData = [];
        let rollNameWasEdited = false;
        let lastGeneratedRollName = '';

        function hasRollsApi() {
            return Boolean(ROLLS_API_URL && ROLLS_API_URL.trim());
        }

        function setRollsSyncStatus(message) {
            const status = document.getElementById('rollsSyncStatus');
            if (status) status.textContent = message;
        }

        function cacheRolls() {
            localStorage.setItem(ROLLS_KEY, JSON.stringify(rollsData));
        }

        function loadRolls() {
            const savedRolls = localStorage.getItem(ROLLS_KEY);
            if (!savedRolls) {
                rollsData = [];
                renderRolls();
            } else {
                try {
                    rollsData = JSON.parse(savedRolls);
                } catch (e) {
                    console.error("Fehler beim Lesen der Rollen", e);
                    rollsData = [];
                }

                renderRolls();
            }

            fetchRollsFromSync({ silent: true });
        }

        function saveRolls() {
            cacheRolls();
            renderRolls();
        }

        async function fetchRollsFromSync(options = {}) {
            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            if (!options.silent) setRollsSyncStatus('Synchronisiere...');

            try {
                const response = await fetch(`${ROLLS_API_URL}?action=list&ts=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                const nextRolls = Array.isArray(payload) ? payload : (payload.rolls || []);
                rollsData = nextRolls.filter(roll => roll && roll.id);
                cacheRolls();
                renderRolls();
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Synchronisieren der Rollen", error);
                setRollsSyncStatus('Offline: lokaler Stand');
            }
        }

        async function syncRollMutation(action, roll) {
            if (!hasRollsApi()) {
                setRollsSyncStatus('Lokal gespeichert');
                return;
            }

            setRollsSyncStatus('Speichere...');

            try {
                const response = await fetch(ROLLS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, roll, id: roll ? roll.id : '' })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const payload = await response.json();
                if (payload.ok === false) throw new Error(payload.error || 'Sync failed');
                if (payload.rolls) {
                    rollsData = payload.rolls.filter(item => item && item.id);
                    cacheRolls();
                    renderRolls();
                }
                setRollsSyncStatus('Synchronisiert');
            } catch (error) {
                console.error("Fehler beim Speichern der Rolle", error);
                setRollsSyncStatus('Nicht synchronisiert');
            }
        }

        function switchView(viewName) {
            const showGuide = viewName === 'guide';
            document.getElementById('guideView').classList.toggle('hidden', !showGuide);
            document.getElementById('rollsView').classList.toggle('hidden', showGuide);
            document.getElementById('guideNavBtn').classList.toggle('active', showGuide);
            document.getElementById('rollsNavBtn').classList.toggle('active', !showGuide);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getFilmById(filmId) {
            return filmsData.find(film => film.id === filmId);
        }

        function formatTodayForInput() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateForRollName(dateValue) {
            const parts = (dateValue || '').split('-');
            if (parts.length !== 3) return '';
            return `${parts[0].slice(-2)}-${parts[1]}-${parts[2]}`;
        }

        function formatDateForDisplay(dateValue) {
            if (!dateValue) return 'Kein Datum';
            const dateText = String(dateValue).slice(0, 10);
            const parts = dateText.split('-');
            if (parts.length !== 3) return 'Kein Datum';
            return `${parts[0].slice(-2)}-${parts[1]}-${parts[2]}`;
        }

        function rollNamePart(value, fallback) {
            const source = String(value || fallback || '').trim();
            return source
                .replace(/[^a-zA-Z0-9äöüÄÖÜß]+/g, '_')
                .replace(/^_+|_+$/g, '') || fallback;
        }

        function buildRollName(dateValue, filmName, cameraName) {
            const datePart = formatDateForRollName(dateValue) || formatDateForRollName(formatTodayForInput());
            const filmPart = rollNamePart(filmName, 'Film');
            const cameraPart = rollNamePart(cameraName, 'Kamera');
            return `${datePart}_${filmPart}_${cameraPart}`;
        }

        function prepareData() {
            if (!filmsData || filmsData.length === 0) {
                document.getElementById('grid').innerHTML =
                    '<div style="text-align:center; color:#777; width:100%; grid-column:1/-1;">Lade Filme aus der Datenbank...</div>';
                return;
            }

            filmsData.forEach(film => {
                if (!film.keywords) film.keywords = [];

                // 1. Alle Specs aus Notion (z.B. "Premium", "Grob") suchbar machen
                if (film.specs) {
                    Object.values(film.specs).forEach(val => {
                        if (val) film.keywords.push(val);
                    });
                }

                // 2. Intelligente Synonyme (Mapping)

                // Korn Synonyme
                if (film.specs.grain === "Klassisch" || film.specs.grain === "Grob") {
                    film.keywords.push("Grain", "Korn", "Stark");
                }

                // Budget Synonyme
                if (film.specs.budget === "Budget") {
                    film.keywords.push("Günstig", "Billig", "Cheap");
                }
                if (film.specs.budget === "Premium") {
                    film.keywords.push("Teuer", "Pro", "Professional", "Profi");
                }

                // Sicherstellen, dass Bildpfad existiert
                if (!film.img) film.img = "";
            });

            renderGrid(filmsData);
            renderRolls();
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML =
                    `<div style="grid-column: 1/-1; text-align: center; color: #777; margin-top: 40px;">Keine Filme gefunden.</div>`;
                return;
            }

            data.forEach(film => {
                let badgeClass = "badge-iso";
                // Check für Typ (inkl. Schreibweisen wie "SW" oder "B&W")
                if (film.type && (film.type.includes("B&W") || film.type.includes("SW"))) badgeClass = "badge-bw";
                if (film.type && (film.type.includes("Slide") || film.type.includes("Dia"))) badgeClass = "badge-slide";

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(film);

                const highlightClass = (val) => (val === activeFilter) ? 'highlight' : '';

                card.innerHTML = `
                <!-- BILD (Packshot Style) -->
                <div class="card-img-container">
                    <img src="${film.img}" 
                         alt="${film.name}" 
                         class="card-img" 
                         onerror="this.parentNode.style.display='none'">
                </div>

                <div class="card-top">
                    <span class="card-brand">${film.brand}</span>
                    <span class="badge ${badgeClass}">${film.process}</span>
                </div>
                <h3 class="card-name">
                    ${film.name}
                    <span style="font-size:0.6em; color:var(--primary); vertical-align:middle; margin-left:5px;">
                        ISO ${film.iso}
                    </span>
                </h3>
                <p class="card-short-desc">${film.shortDesc}</p>
                <div class="spec-tags">
                    <span class="spec-tag ${highlightClass(film.specs.grain)}">${film.specs.grain}</span>
                    <span class="spec-tag ${highlightClass(film.specs.handling)}">${film.specs.handling}</span>
                    <span class="spec-tag ${highlightClass(film.specs.budget)}">${film.specs.budget}</span>
                </div>
            `;
                grid.appendChild(card);
            });
        }

        function setFilter(filterValue, btnElement, mode) {
            activeFilter = filterValue;
            filterMode = mode;

            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btnElement.classList.add('active');

            executeSearch();
        }

        function executeSearch() {
            const rawQuery = document.getElementById('searchInput').value.toLowerCase();
            const query = rawQuery.trim();

            const filtered = filmsData.filter(film => {
                const searchableText = [
                    film.name,
                    film.brand,
                    film.shortDesc,
                    film.process,
                    film.type,
                    film.keywords.join(" "),
                    film.uses.join(" ")
                ].join(" ").toLowerCase();

                const textMatch = searchableText.includes(query);

                let catMatch = true;
                if (activeFilter !== 'all') {
                    if (filterMode === 'use') {
                        // Prüfen ob einer der Uses matcht
                        catMatch = film.uses.some(u => u === activeFilter || u.includes(activeFilter));
                    } else if (filterMode === 'spec') {
                        // Prüfen ob eine der Specs matcht
                        const specsValues = Object.values(film.specs);
                        catMatch = specsValues.includes(activeFilter);
                    }
                }

                return textMatch && catMatch;
            });

            renderGrid(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', executeSearch);

        function resetFilters() {
            const search = document.getElementById('searchInput');
            search.value = '';

            activeFilter = 'all';
            filterMode = 'use';

            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

            const allUseChip = document.getElementById('useAllChip');
            if (allUseChip) {
                allUseChip.classList.add('active');
            }

            renderGrid(filmsData);
        }

        function renderRolls() {
            const grid = document.getElementById('rollsGrid');
            if (!grid) return;

            grid.innerHTML = '';

            if (rollsData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <strong>Noch keine Rollen.</strong><br>
                        Lege eine Rolle direkt aus einem Film im Guide an.
                    </div>
                `;
                return;
            }

            const statusRank = { "In Kamera": 1, "Belichtet": 2, "Entwickelt": 3 };
            const sortedRolls = [...rollsData].sort((a, b) => {
                const byStatus = (statusRank[a.status] || 9) - (statusRank[b.status] || 9);
                if (byStatus !== 0) return byStatus;
                return String(b.loadedAt || '').localeCompare(String(a.loadedAt || ''));
            });

            sortedRolls.forEach(roll => {
                const film = getFilmById(roll.filmId);
                const rollDate = roll.loadedAt || roll.createdAt || roll.updatedAt;
                const card = document.createElement('div');
                card.className = 'card roll-card';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-brand">${escapeHtml(roll.status || 'In Kamera')}</span>
                        <span class="badge badge-iso">${escapeHtml(formatDateForDisplay(rollDate))}</span>
                    </div>
                    <h3 class="card-name">${escapeHtml(roll.name)}</h3>
                    <p class="card-short-desc">${escapeHtml(film ? `${film.brand} ${film.name}` : roll.filmName)}</p>
                    <div class="roll-meta">
                        <div class="info-card"><div class="info-item"><label>Kamera</label><span>${escapeHtml(roll.camera || 'Nicht gesetzt')}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Film</label><span>${escapeHtml(roll.filmName || 'Nicht gesetzt')}</span></div></div>
                    </div>
                    <div class="roll-actions">
                        ${film ? `<button type="button" class="secondary-btn" onclick="openModal(getFilmById('${escapeHtml(roll.filmId)}'))">Guide öffnen</button>` : ''}
                        <button type="button" class="secondary-btn" onclick="openRollForm('${escapeHtml(roll.filmId)}', '${escapeHtml(roll.id)}')">Bearbeiten</button>
                        <button type="button" class="danger-btn" onclick="deleteRoll('${escapeHtml(roll.id)}')">Löschen</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openEmptyRollForm() {
            openRollForm('');
        }

        function openRollForm(filmId, rollId) {
            const existingRoll = rollId ? rollsData.find(roll => roll.id === rollId) : null;
            const film = getFilmById(filmId) || null;
            const loadedAt = existingRoll ? existingRoll.loadedAt : formatTodayForInput();
            const camera = existingRoll ? existingRoll.camera : '';
            const filmName = existingRoll ? existingRoll.filmName : (film ? film.name : '');
            const rollName = existingRoll ? existingRoll.name : buildRollName(loadedAt, filmName, camera);
            const overlay = document.getElementById('modalOverlay');
            const contentBlock = document.querySelector('.modal-content');

            rollNameWasEdited = Boolean(existingRoll);
            lastGeneratedRollName = rollName;

            contentBlock.innerHTML = `
                <button class="close-btn" onclick="closeModal(null)">&times;</button>
                <div class="modal-body">
                    <span class="card-brand" style="color:var(--primary);">${existingRoll ? 'Rolle bearbeiten' : 'Neue Rolle'}</span>
                    <h2 style="font-family: var(--font-headings); font-weight:800; margin: 5px 0 24px; font-size: 2rem; color: #fff; line-height:1.1;">${escapeHtml(filmName || 'Film wählen')}</h2>
                    <form class="form-grid" onsubmit="saveRollFromForm(event, '${escapeHtml(rollId || '')}', '${escapeHtml(filmId || '')}')">
                        <div class="form-field">
                            <label for="rollFilmName">Film</label>
                            <input id="rollFilmName" type="text" value="${escapeHtml(filmName)}" ${film ? 'readonly' : ''} oninput="syncRollNameDefault()" required>
                        </div>
                        <div class="form-field">
                            <label for="rollCamera">Kamera</label>
                            <input id="rollCamera" type="text" value="${escapeHtml(camera)}" placeholder="z.B. Leica M6" oninput="syncRollNameDefault()" required>
                        </div>
                        <div class="form-field">
                            <label for="rollLoadedAt">Datum eingelegt</label>
                            <input id="rollLoadedAt" type="date" value="${escapeHtml(loadedAt)}" onchange="syncRollNameDefault()" required>
                        </div>
                        <div class="form-field">
                            <label for="rollName">Roll-Name</label>
                            <input id="rollName" type="text" value="${escapeHtml(rollName)}" oninput="rollNameWasEdited = true" required>
                        </div>
                        <div class="form-field">
                            <label for="rollStatus">Status</label>
                            <select id="rollStatus">
                                <option ${(!existingRoll || existingRoll.status === 'In Kamera') ? 'selected' : ''}>In Kamera</option>
                                <option ${(existingRoll && existingRoll.status === 'Belichtet') ? 'selected' : ''}>Belichtet</option>
                                <option ${(existingRoll && existingRoll.status === 'Entwickelt') ? 'selected' : ''}>Entwickelt</option>
                            </select>
                        </div>
                        <button type="submit" class="primary-btn">Speichern</button>
                    </form>
                </div>
            `;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function syncRollNameDefault() {
            const rollNameInput = document.getElementById('rollName');
            const filmNameInput = document.getElementById('rollFilmName');
            const cameraInput = document.getElementById('rollCamera');
            const dateInput = document.getElementById('rollLoadedAt');
            if (!rollNameInput || !filmNameInput || !cameraInput || !dateInput) return;

            if (rollNameInput.value !== lastGeneratedRollName) {
                rollNameWasEdited = true;
            }

            const nextName = buildRollName(dateInput.value, filmNameInput.value, cameraInput.value);
            if (!rollNameWasEdited || rollNameInput.value === lastGeneratedRollName) {
                rollNameInput.value = nextName;
                rollNameWasEdited = false;
            }
            lastGeneratedRollName = nextName;
        }

        async function saveRollFromForm(event, rollId, filmId) {
            event.preventDefault();

            const film = getFilmById(filmId);
            const name = document.getElementById('rollName').value.trim();
            const camera = document.getElementById('rollCamera').value.trim();
            const loadedAt = document.getElementById('rollLoadedAt').value;
            const filmName = document.getElementById('rollFilmName').value.trim();
            const status = document.getElementById('rollStatus').value;
            const existingRoll = rollId ? rollsData.find(item => item.id === rollId) : null;
            const roll = {
                id: rollId || `roll_${Date.now()}`,
                filmId: film ? film.id : '',
                filmName: film ? film.name : filmName,
                name: name || buildRollName(loadedAt, filmName, camera),
                camera,
                loadedAt,
                status,
                createdAt: existingRoll ? existingRoll.createdAt : '',
                updatedAt: new Date().toISOString()
            };

            if (rollId) {
                rollsData = rollsData.map(item => item.id === rollId ? roll : item);
            } else {
                roll.createdAt = roll.updatedAt;
                rollsData.unshift(roll);
            }

            saveRolls();
            closeModal(null);
            switchView('rolls');
            await syncRollMutation('upsert', roll);
        }

        async function deleteRoll(rollId) {
            const roll = rollsData.find(item => item.id === rollId);
            if (!roll) return;
            if (!window.confirm(`Rolle "${roll.name}" löschen?`)) return;
            rollsData = rollsData.filter(item => item.id !== rollId);
            saveRolls();
            await syncRollMutation('delete', { id: rollId });
        }

        function openModal(film) {
            if (!film) return;
            const overlay = document.getElementById('modalOverlay');
            const contentBlock = document.querySelector('.modal-content');

            let badgeClass = "badge-iso";
            if (film.type && (film.type.includes("B&W") || film.type.includes("SW"))) badgeClass = "badge-bw";
            else if (film.type && (film.type.includes("Slide") || film.type.includes("Dia"))) badgeClass = "badge-slide";
            else if (film.process && film.process.includes("C-41")) badgeClass = "badge-c41";

            // Hintergrundbild für die Hero Section aus dem Packshot extrahieren und extrem bluren
            const heroBg = film.img ? `background-image: url('${film.img}');` : '';

            // Modal Content überschreiben (close-btn bleibt als Eventuell Delegate hängen, also neu erzeugen)
            contentBlock.innerHTML = `
                <button class="close-btn" onclick="closeModal(null)">&times;</button>
                
                <div class="modal-hero" style="${heroBg}">
                    ${film.img ? `<img src="${film.img}" class="modal-hero-img" alt="${film.name}">` : ''}
                    <div class="modal-hero-text">
                        <span class="card-brand" style="color:var(--primary);">${film.brand}</span>
                        <h2 style="font-family: var(--font-headings); font-weight:800; margin: 5px 0 10px; font-size: 2.5rem; color: #fff; line-height:1.1;">${film.name}</h2>
                        <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                            <span class="badge badge-iso" style="font-size:1rem; padding: 6px 12px; border-radius:8px;">ISO ${film.iso}</span>
                            <span class="badge ${badgeClass}" style="font-size:1rem; padding: 6px 12px; border-radius:8px;">${film.process}</span>
                        </div>
                        <button type="button" class="primary-btn" style="margin-top:18px;" onclick="openRollForm('${escapeHtml(film.id)}')">Rolle anlegen</button>
                    </div>
                </div>

                <div class="modal-body">
                    ${film.tips && film.tips.exposure ? `
                    <div class="pro-tip-box">
                        <span style="font-weight:800; font-family:var(--font-headings); letter-spacing:1px; color:var(--primary); display:block; margin-bottom:8px;">💡 PRO TIP</span>
                        <p style="margin: 0; color: #e4e4e7; line-height:1.6;">${film.tips.exposure}</p>
                    </div>` : ''}

                    <p style="font-size:1.1rem; color: #d4d4d8; line-height: 1.6; font-style:italic; margin-bottom:30px; border-left: 2px solid var(--surface-border); padding-left:15px;">
                        "${film.look.desc}"
                    </p>

                    <div class="section-title">Specs</div>
                    <div class="info-grid">
                        <div class="info-card"><div class="info-item"><label>Korn</label><span>${film.specs.grain}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Verhalten</label><span>${film.specs.handling}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Sättigung</label><span>${film.specs.saturation}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Preissegment</label><span>${film.specs.budget}</span></div></div>
                    </div>

                    <div class="section-title">Einsatzgebiete</div>
                    <div style="display:flex; flex-wrap:wrap; gap:10px;">
                        ${film.uses.map(u => `<span class="chip" style="cursor:default; background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); color:#fff;">${u}</span>`).join('')}
                        ${film.formats.map(f => `<span class="chip" style="cursor:default; background:transparent; border-style:dashed; border-color:rgba(255,255,255,0.2); color:#a1a1aa;">${f}</span>`).join('')}
                    </div>
                    
                    <div class="section-title" style="margin-top:40px">Technische Details</div>
                    <div style="font-size: 0.95rem; line-height:1.6; color: #a1a1aa; display:grid; grid-template-columns: 1fr; gap:15px; background:rgba(0,0,0,0.2); padding: 20px; border-radius:12px; border:1px solid var(--surface-border);">
                        <div><strong style="color:#fff;">Scan:</strong> ${film.tips.scanning}</div>
                        <div><strong style="color:#fff;">Dev:</strong> ${film.tips.dev}</div>
                    </div>
                </div>
            `;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e === null || e.target.id === 'modalOverlay') {
                document.getElementById('modalOverlay').classList.remove('open');
                document.body.style.overflow = 'auto';
            }
        }

        // Initialer Lade-Aufruf statt statischem `prepareData()`
        function loadFilmsFromGoogleSheet() {
            // Erstmal Lade-Text anzeigen
            prepareData();

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    const data = results.data;
                    console.log("Daten aus Google Sheets:", data);

                    filmsData = data.map(row => {
                        return {
                            id: row["ID"] || row["Name"]?.toLowerCase().replace(/\s+/g, '-'),
                            brand: row["Marke"] || "",
                            name: row["Name"] || "",
                            img: row["Bilder"] ? 'img/' + row["Bilder"] : "", // Wir bauen weiter auf dem img/ Ordner
                            iso: parseInt(row["ISO"]) || 0,
                            type: row["Typ"] || "",
                            // Formate & Einsatz als Array trennen, z.B. "120, 35mm" -> ["120", "35mm"]
                            formats: row["Formate"] ? row["Formate"].split(",").map(s => s.trim()) : [],
                            process: row["Typ"] === "B&W" ? "B&W" : (row["Typ"] === "Slide" ? "E-6" : "C-41"),
                            shortDesc: row["Kurzbeschreibung"] || "",
                            specs: {
                                grain: row["Grain"] || "",
                                handling: row["Handling"] || "",
                                saturation: row["Sättigung"] || "",
                                budget: row["Budget"] || ""
                            },
                            uses: row["Einsatz"] ? row["Einsatz"].split(",").map(s => s.trim()) : [],
                            keywords: [],
                            look: {
                                desc: row["Look Beschreibung"] || ""
                            },
                            tips: {
                                exposure: row["Tipp: Belichtung"] || "",
                                scanning: row["Tipp: Scan"] || "",
                                dev: row["Tipp: Dev"] || ""
                            }
                        };
                    });

                    // Nach dem Mapping bereiten wir die Daten für das Frontend vor
                    prepareData();
                },
                error: function (error) {
                    console.error("Fehler beim Laden:", error);
                    document.getElementById('grid').innerHTML = '<div style="color:red; text-align:center; grid-column:1/-1;">Fehler beim Laden der Filmdaten. Bitte überprüfe die Google Sheets URL.</div>';
                }
            });
        }

        // Direkt starten
        loadRolls();
        loadFilmsFromGoogleSheet();
    </script>

</body>
