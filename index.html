                        </div>
                        <div class="form-field">
                            <label for="rollFilmSelect">Film</label>
                            <select id="rollFilmSelect" onchange="handleRollFilmChoiceChange()" required>
                                <option value="">Film wählen</option>
                                ${filmOptions}
                                <option value="__custom__" ${selectedFilmValue === '__custom__' ? 'selected' : ''}>Anderen Film eintragen</option>
                            </select>
                        </div>
                        <div class="form-field${customFilmHiddenClass}" id="rollCustomFilmField">
                            <label for="rollFilmName">Neuer Film</label>
                            <input id="rollFilmName" type="text" value="${escapeHtml(filmName)}" placeholder="z.B. Kodak ColorPlus 200" oninput="syncRollNameDefault()" ${selectedFilmValue === '__custom__' ? 'required' : ''}>
                        </div>
                        <div class="form-field">
                            <label for="rollCameraSelect">Kamera</label>
                            <select id="rollCameraSelect" onchange="handleRollCameraChoiceChange()" required>
                                ${cameraOptions}
                            </select>
                        </div>
                        <div class="form-field${customCameraHiddenClass}" id="rollCustomCameraField">
                            <label for="rollCamera">Neue Kamera</label>
                            <input id="rollCamera" type="text" value="${escapeHtml(camera)}" placeholder="z.B. Leica M6" oninput="syncRollNameDefault()" ${selectedCameraValue === '__custom__' ? 'required' : ''}>
                        </div>
                        <div class="form-field">
                            <label for="rollLoadedAt">Datum eingelegt</label>
                            <input id="rollLoadedAt" type="date" value="${escapeHtml(loadedAt)}" onchange="syncRollNameDefault()" required>
                        </div>
                        <div class="form-field">
                            <label for="rollFormat">Format</label>
                            <select id="rollFormat" required>
                                <option value="">Format wählen</option>
                                ${formatOptions}
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="rollRatedIso">ISO eingestellt</label>
                            <input id="rollRatedIso" type="number" inputmode="numeric" value="${escapeHtml(ratedIso)}" placeholder="z.B. 200">
                        </div>
                        <div class="form-field">
                            <label for="rollName">Roll-Name</label>
                            <input id="rollName" type="text" value="${escapeHtml(rollName)}" oninput="rollNameWasEdited = true" required>
                        </div>
                        <div class="form-field">
                            <label for="rollNote">Notiz</label>
                            <textarea id="rollNote" placeholder="z.B. Push/Pull, Motiv, Reise, Laborhinweis">${escapeHtml(note)}</textarea>
                        </div>
                        <div class="form-field">
                            <label for="rollStatus">Status</label>
                            <select id="rollStatus">
                                <option ${(!existingRoll || existingRoll.status === 'In Kamera') ? 'selected' : ''}>In Kamera</option>
                                <option ${(existingRoll && existingRoll.status === 'Belichtet') ? 'selected' : ''}>Belichtet</option>
                                <option ${(existingRoll && existingRoll.status === 'Entwickelt') ? 'selected' : ''}>Entwickelt</option>
                            </select>
                        </div>
                        <input id="rollProcess" type="hidden" value="${escapeHtml(process)}">
                        <button type="submit" class="primary-btn">Speichern</button>
                    </form>
                </div>
            `;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function syncRollNameDefault() {
            const rollNameInput = document.getElementById('rollName');
            const filmNameInput = document.getElementById('rollFilmName');
            const cameraInput = document.getElementById('rollCamera');
            const dateInput = document.getElementById('rollLoadedAt');
            if (!rollNameInput || !filmNameInput || !cameraInput || !dateInput) return;

            if (rollNameInput.value !== lastGeneratedRollName) {
                rollNameWasEdited = true;
            }

            const nextName = buildRollName(dateInput.value, filmNameInput.value, cameraInput.value);
            if (!rollNameWasEdited || rollNameInput.value === lastGeneratedRollName) {
                rollNameInput.value = nextName;
                rollNameWasEdited = false;
            }
            lastGeneratedRollName = nextName;
        }

        async function saveRollFromForm(event, rollId) {
            event.preventDefault();

            const selectedFilmId = document.getElementById('rollFilmSelect').value;
            const selectedFilm = selectedFilmId && selectedFilmId !== '__custom__' ? getFilmById(selectedFilmId) : null;
            const selectedCameraId = document.getElementById('rollCameraSelect').value;
            const selectedCamera = selectedCameraId && selectedCameraId !== '__custom__' ? getCameraById(selectedCameraId) : null;
            const name = document.getElementById('rollName').value.trim();
            let camera = selectedCamera ? getCameraLabel(selectedCamera) : document.getElementById('rollCamera').value.trim();
            let cameraId = selectedCamera ? selectedCamera.id : '';
            const loadedAt = document.getElementById('rollLoadedAt').value;
            const filmName = document.getElementById('rollFilmName').value.trim();
            const format = normalizeRollFormat(document.getElementById('rollFormat').value);
            const ratedIso = document.getElementById('rollRatedIso').value.trim();
            const note = document.getElementById('rollNote').value.trim();
            const process = document.getElementById('rollProcess').value.trim();
            const status = document.getElementById('rollStatus').value;
            const existingRoll = rollId ? rollsData.find(item => item.id === rollId) : null;
            const rollCode = existingRoll ? getRollCode(existingRoll) : (document.getElementById('rollCode').value.trim() || generateNextRollCode(rollsData));
            let newCamera = null;

            if (!cameraId && camera) {
                const matchingCamera = getCameraByName(camera);
                if (matchingCamera) {
                    cameraId = matchingCamera.id;
                    camera = getCameraLabel(matchingCamera);
                } else {
                    newCamera = {
                        id: `camera_${Date.now()}`,
                        name: camera,
                        format,
                        note: '',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        userEmail: userProfile.email,
                        userName: userProfile.name || ''
                    };
                    cameraId = newCamera.id;
                    camerasData.push(newCamera);
                    saveCameras();
                }
            }

            const roll = {
                id: rollId || `roll_${Date.now()}`,
                rollCode,
                filmId: selectedFilm ? selectedFilm.id : '',
                filmName: selectedFilm ? selectedFilm.name : filmName,
                name: name || buildRollName(loadedAt, filmName, camera),
                cameraId,
                camera,
                loadedAt,
                format,
                ratedIso,
                note,
                process,
                status,
                createdAt: existingRoll ? getRollValue(existingRoll, ['createdAt', 'created_at', 'Created at', 'created at']) : '',
                updatedAt: new Date().toISOString(),
                userEmail: userProfile.email,
                userName: userProfile.name || ''
            };

            if (rollId) {
                rollsData = rollsData.map(item => item.id === rollId ? roll : item);
            } else {
                roll.createdAt = roll.updatedAt;
                rollsData.unshift(roll);
            }

            saveRolls();
            closeModal(null);
            switchView('rolls');
            if (newCamera) await syncCameraMutation('upsertCamera', newCamera);
            await syncRollMutation('upsert', roll);
        }

        async function deleteRoll(rollId) {
            const roll = rollsData.find(item => item.id === rollId);
            if (!roll) return;
            if (!window.confirm(`Rolle "${roll.name}" löschen?`)) return;
            rollsData = rollsData.filter(item => item.id !== rollId);
            saveRolls();
            await syncRollMutation('delete', { id: rollId });
        }

        function openModal(film) {
            if (!film) return;
            const overlay = document.getElementById('modalOverlay');
            const contentBlock = document.querySelector('.modal-content');

            let badgeClass = "badge-iso";
            if (film.type && (film.type.includes("B&W") || film.type.includes("SW"))) badgeClass = "badge-bw";
            else if (film.type && (film.type.includes("Slide") || film.type.includes("Dia"))) badgeClass = "badge-slide";
            else if (film.process && film.process.includes("C-41")) badgeClass = "badge-c41";

            // Hintergrundbild für die Hero Section aus dem Packshot extrahieren und extrem bluren
            const heroBg = film.img ? `background-image: url('${film.img}');` : '';

            // Modal Content überschreiben (close-btn bleibt als Eventuell Delegate hängen, also neu erzeugen)
            contentBlock.innerHTML = `
                <button class="close-btn" onclick="closeModal(null)">&times;</button>
                
                <div class="modal-hero" style="${heroBg}">
                    ${film.img ? `<img src="${film.img}" class="modal-hero-img" alt="${film.name}">` : ''}
                    <div class="modal-hero-text">
                        <span class="card-brand" style="color:var(--primary);">${film.brand}</span>
                        <h2 style="font-family: var(--font-headings); font-weight:800; margin: 5px 0 10px; font-size: 2.5rem; color: #fff; line-height:1.1;">${film.name}</h2>
                        <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                            <span class="badge badge-iso" style="font-size:1rem; padding: 6px 12px; border-radius:8px;">ISO ${film.iso}</span>
                            <span class="badge ${badgeClass}" style="font-size:1rem; padding: 6px 12px; border-radius:8px;">${film.process}</span>
                        </div>
                        <button type="button" class="primary-btn" style="margin-top:18px;" onclick="openRollForm('${escapeHtml(film.id)}')">Rolle anlegen</button>
                    </div>
                </div>

                <div class="modal-body">
                    ${film.tips && film.tips.exposure ? `
                    <div class="pro-tip-box">
                        <span style="font-weight:800; font-family:var(--font-headings); letter-spacing:1px; color:var(--primary); display:block; margin-bottom:8px;">💡 PRO TIP</span>
                        <p style="margin: 0; color: #e4e4e7; line-height:1.6;">${film.tips.exposure}</p>
                    </div>` : ''}

                    <p style="font-size:1.1rem; color: #d4d4d8; line-height: 1.6; font-style:italic; margin-bottom:30px; border-left: 2px solid var(--surface-border); padding-left:15px;">
                        "${film.look.desc}"
                    </p>

                    <div class="section-title">Specs</div>
                    <div class="info-grid">
                        <div class="info-card"><div class="info-item"><label>Korn</label><span>${film.specs.grain}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Belichtungsspielraum</label><span>${film.specs.exposure}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Sättigung</label><span>${film.specs.saturation}</span></div></div>
                        <div class="info-card"><div class="info-item"><label>Preissegment</label><span>${film.specs.budget}</span></div></div>
                        ${film.specs.tone ? `<div class="info-card"><div class="info-item"><label>Farbton</label><span>${film.specs.tone}</span></div></div>` : ''}
                        ${film.specs.contrast ? `<div class="info-card"><div class="info-item"><label>Kontrast</label><span>${film.specs.contrast}</span></div></div>` : ''}
                    </div>

                    <div class="section-title">Formate</div>
                    <div style="display:flex; flex-wrap:wrap; gap:10px;">
                        ${film.formats.map(f => `<span class="chip" style="cursor:default; background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); color:#fff;">${f}</span>`).join('')}
                    </div>
                    
                    <div class="section-title" style="margin-top:40px">Technische Details</div>
                    <div style="font-size: 0.95rem; line-height:1.6; color: #a1a1aa; display:grid; grid-template-columns: 1fr; gap:15px; background:rgba(0,0,0,0.2); padding: 20px; border-radius:12px; border:1px solid var(--surface-border);">
                        ${film.specs.exposureNote ? `<div><strong style="color:#fff;">Belichtungsspielraum:</strong> ${film.specs.exposureNote}</div>` : ''}
                        ${film.tips.scanning ? `<div><strong style="color:#fff;">Scan:</strong> ${film.tips.scanning}</div>` : ''}
                        ${film.tips.dev ? `<div><strong style="color:#fff;">Entwicklung:</strong> ${film.tips.dev}</div>` : ''}
                    </div>
                </div>
            `;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e === null || e.target.id === 'modalOverlay') {
                document.getElementById('modalOverlay').classList.remove('open');
                document.body.style.overflow = 'auto';
            }
        }

        // Initialer Lade-Aufruf statt statischem `prepareData()`
        function loadFilmsFromGoogleSheet() {
            // Erstmal Lade-Text anzeigen
            prepareData();

            Papa.parse(withCacheBuster(SHEET_CSV_URL), {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    const data = results.data;
                    console.log("Daten aus Google Sheets:", data);

                    filmsData = data.map(row => {
                        const filmType = getFirstCsvValue(row, ["Filmtyp", "Typ"]);
                        const process = getFirstCsvValue(row, ["Prozess"]) ||
                            (filmType === "B&W" ? "B&W" : (filmType === "Slide" ? "E-6" : "C-41"));
                        const formatValue = getFirstCsvValue(row, ["Formate aktuell", "Formate"]);
                        const usesValue = getFirstCsvValue(row, ["Einsatz", "Alt Einsatzgebiete"]);

                        return {
                            id: getCsvValue(row, "ID") || getCsvValue(row, "Name").toLowerCase().replace(/\s+/g, '-'),
                            brand: getCsvValue(row, "Marke"),
                            name: getCsvValue(row, "Name"),
                            img: getFilmImagePath(getCsvValue(row, "Bilder")),
                            iso: parseInt(getFirstCsvValue(row, ["ISO Box", "ISO"])) || 0,
                            type: filmType,
                            formats: formatValue ? formatValue.split(",").map(s => normalizeRollFormat(s)).filter(Boolean) : [],
                            process,
                            shortDesc: getCsvValue(row, "Kurzbeschreibung"),
                            specs: {
                                grain: getFirstCsvValue(row, ["Korn", "Grain"]),
                                exposure: getFirstCsvValue(row, ["Belichtungsspielraum", "Handling"]),
                                exposureNote: getCsvValue(row, "Belichtungsspielraum Hinweis"),
                                saturation: getCsvValue(row, "Sättigung"),
                                tone: getCsvValue(row, "Farbton"),
                                contrast: getCsvValue(row, "Kontrast"),
                                budget: getFirstCsvValue(row, ["Preisniveau", "Budget"])
                            },
                            uses: usesValue ? usesValue.split(",").map(s => s.trim()) : [],
                            keywords: [],
                            look: {
                                desc: getCsvValue(row, "Look Beschreibung")
                            },
                            tips: {
                                exposure: getFirstCsvValue(row, ["Tipp Belichtung", "Tipp: Belichtung"]),
                                scanning: getFirstCsvValue(row, ["Tipp Scan", "Tipp: Scan"]),
                                dev: getFirstCsvValue(row, ["Tipp Entwicklung", "Tipp: Dev"])
                            }
                        };
                    });

                    // Nach dem Mapping bereiten wir die Daten für das Frontend vor
                    prepareData();
                    renderRolls();
                },
                error: function (error) {
                    console.error("Fehler beim Laden:", error);
                    document.getElementById('grid').innerHTML = '<div style="color:red; text-align:center; grid-column:1/-1;">Fehler beim Laden der Filmdaten. Bitte überprüfe die Google Sheets URL.</div>';
                }
            });
        }

        // Direkt starten
        loadUserProfile();
        loadCameras();
        loadLenses();
        loadRolls();
        loadFilmsFromGoogleSheet();
    </script>

</body>
